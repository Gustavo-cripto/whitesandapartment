<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>White Sand Apartments | Acesso Wi-Fi</title>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1f2a37;
      min-height: 100dvh;
      background-color: #e5d7bb;
      background-image:
        linear-gradient(rgba(244, 248, 255, 0.08), rgba(244, 248, 255, 0.12)),
        url("./fundo-praia.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat, repeat-y;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }
    .hero {
      background: linear-gradient(140deg, rgba(236, 228, 210, 0.92), rgba(231, 221, 200, 0.9));
      border: 1px solid rgba(168, 151, 120, 0.35);
      border-radius: 14px;
      padding: 14px;
    }
    .back {
      text-decoration: none;
      color: #1f2a37;
      border: 1px solid rgba(31, 42, 55, 0.25);
      background: rgba(255, 255, 255, 0.65);
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 700;
      display: inline-block;
      margin-bottom: 10px;
    }
    h1 { margin: 0 0 6px; font-size: clamp(1.2rem, 2.5vw, 1.8rem); }
    .subtitle { margin: 0; }
    .card {
      margin-top: 12px;
      background: #efe3cf;
      border: 1px solid #b79f72;
      border-radius: 14px;
      padding: 14px;
    }
    .line { margin: 8px 0; }
    .pill {
      display: inline-block;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(31, 42, 55, 0.2);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #5f6c7b;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <a class="back" id="backLink" href="./detalhe.html?sec=wifi&lang=pt">← Voltar</a>
      <h1 id="title">Acesso Wi-Fi por apartamento</h1>
      <p class="subtitle" id="subtitle">Validação por email concluída. Conteúdo deste apartamento.</p>
    </section>

    <section class="card" id="content"></section>
  </main>

  <script>
    const t = {
      pt: {
        title: "Acesso Wi-Fi por apartamento",
        subtitle: "Validação por email concluída. Conteúdo deste apartamento.",
        apt: "Apartamento",
        network: "Rede",
        password: "Password",
        hidden: "Oculta até configurar credenciais.",
        status: "🔒 Aguarda configuração final",
        note: "Depois de ativares o Cloudflare Access, este link pede email + código OTP automaticamente."
      },
      en: {
        title: "Apartment Wi-Fi access",
        subtitle: "Email validation completed. Content for this apartment.",
        apt: "Apartment",
        network: "Network",
        password: "Password",
        hidden: "Hidden until credentials are configured.",
        status: "🔒 Final setup pending",
        note: "After enabling Cloudflare Access, this link will automatically request email + OTP code."
      },
      fr: {
        title: "Acces Wi-Fi par appartement",
        subtitle: "Validation par email terminee. Contenu de cet appartement.",
        apt: "Appartement",
        network: "Reseau",
        password: "Mot de passe",
        hidden: "Masque jusqu'a la configuration des identifiants.",
        status: "🔒 Configuration finale en attente",
        note: "Apres activation de Cloudflare Access, ce lien demandera automatiquement email + code OTP."
      },
      es: {
        title: "Acceso Wi-Fi por apartamento",
        subtitle: "Validacion por email completada. Contenido de este apartamento.",
        apt: "Apartamento",
        network: "Red",
        password: "Contrasena",
        hidden: "Oculta hasta configurar credenciales.",
        status: "🔒 Configuracion final pendiente",
        note: "Tras activar Cloudflare Access, este enlace pedira automaticamente email + codigo OTP."
      },
      de: {
        title: "WLAN-Zugriff pro Apartment",
        subtitle: "E-Mail-Validierung abgeschlossen. Inhalt fuer dieses Apartment.",
        apt: "Apartment",
        network: "Netzwerk",
        password: "Passwort",
        hidden: "Versteckt bis die Zugangsdaten konfiguriert sind.",
        status: "🔒 Endkonfiguration ausstehend",
        note: "Nach Aktivierung von Cloudflare Access fordert dieser Link automatisch E-Mail + OTP-Code an."
      }
    };

    const params = new URLSearchParams(window.location.search);
    const apt = (params.get("apt") || "B").toUpperCase();
    let lang = params.get("lang") || "pt";
    if (!t[lang]) lang = "pt";
    const d = t[lang];

    document.documentElement.lang = lang === "pt" ? "pt-PT" : lang;
    document.getElementById("title").textContent = d.title;
    document.getElementById("subtitle").textContent = d.subtitle;
    document.getElementById("backLink").href = `./detalhe.html?sec=wifi&lang=${lang}`;

    document.getElementById("content").innerHTML =
      `<p class='line'><strong>${d.apt} ${apt}</strong> <span class='pill'>${d.status}</span></p>` +
      `<p class='line'><strong>${d.network}:</strong> ${d.hidden}</p>` +
      `<p class='line'><strong>${d.password}:</strong> ${d.hidden}</p>` +
      `<p class='line'>${d.note}</p>`;
  </script>
</body>
</html>

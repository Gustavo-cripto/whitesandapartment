<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>White Sand Apartments | Acesso Wi-Fi</title>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1f2a37;
      min-height: 100dvh;
      background-color: #e5d7bb;
      background-image:
        linear-gradient(rgba(244, 248, 255, 0.08), rgba(244, 248, 255, 0.12)),
        url("./fundo-praia.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat, repeat-y;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }
    .hero {
      background: linear-gradient(140deg, rgba(236, 228, 210, 0.92), rgba(231, 221, 200, 0.9));
      border: 1px solid rgba(168, 151, 120, 0.35);
      border-radius: 14px;
      padding: 14px;
    }
    .back {
      text-decoration: none;
      color: #1f2a37;
      border: 1px solid rgba(31, 42, 55, 0.25);
      background: rgba(255, 255, 255, 0.65);
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 700;
      display: inline-block;
      margin-bottom: 10px;
    }
    h1 { margin: 0 0 6px; font-size: clamp(1.2rem, 2.5vw, 1.8rem); }
    .subtitle { margin: 0; }
    .card {
      margin-top: 12px;
      background: #efe3cf;
      border: 1px solid #b79f72;
      border-radius: 14px;
      padding: 14px;
    }
    .line { margin: 8px 0; }
    .muted { color: #5f6c7b; }
    .pill {
      display: inline-block;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(31, 42, 55, 0.2);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #5f6c7b;
    }
    .field {
      width: 100%;
      border: 1px solid #b79f72;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.92);
      color: #1f2a37;
    }
    .btn-row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid #b79f72;
      background: #f7f5f2;
      color: #1f2a37;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn.primary {
      background: #1f2a37;
      border-color: #1f2a37;
      color: #fff;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .status {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #b79f72;
      background: rgba(255, 255, 255, 0.55);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <a class="back" id="backLink" href="./detalhe.html?sec=wifi&lang=pt">← Voltar</a>
      <h1 id="title">Acesso Wi-Fi por apartamento</h1>
      <p class="subtitle" id="subtitle">Validação por email concluída. Conteúdo deste apartamento.</p>
    </section>

    <section class="card" id="content"></section>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script>
    const t = {
      pt: {
        title: "Acesso Wi-Fi por apartamento",
        subtitle: "Acesso por email OTP para este apartamento.",
        apt: "Apartamento",
        network: "Rede",
        password: "Password",
        hidden: "Oculta até configurar credenciais.",
        status: "🔒 Aguarda configuração final",
        note: "Introduza o seu email para receber o link/codigo de acesso.",
        emailLabel: "Email do hóspede",
        sendAccess: "Receber acesso por email",
        checkInbox: "Verifique o seu email. Foi enviado um link/codigo de acesso. Se não encontrar, veja a pasta Spam/Lixo eletrónico.",
        loading: "A validar acesso...",
        noAccess: "Sem permissao para visualizar este apartamento.",
        configured: "Acesso autorizado para este apartamento.",
        logout: "Terminar sessão",
        setupNeeded: "Configuração Supabase em falta. Preencha o ficheiro supabase-config.js.",
        notConfigured: "Credenciais deste apartamento ainda não configuradas.",
        fetchError: "Não foi possível validar agora. Verifique internet/configuração e tente novamente.",
        retry: "Tentar novamente",
        switchEmail: "Entrar com outro email",
        configUrl: "Project URL",
        configKey: "Anon Key",
        saveConfig: "Guardar configuração",
        clearConfig: "Limpar",
        configSaved: "Configuração guardada. A recarregar..."
      },
      en: {
        title: "Apartment Wi-Fi access",
        subtitle: "Email OTP access for this apartment.",
        apt: "Apartment",
        network: "Network",
        password: "Password",
        hidden: "Hidden until credentials are configured.",
        status: "🔒 Final setup pending",
        note: "Enter your email to receive the access link/code.",
        emailLabel: "Guest email",
        sendAccess: "Send access by email",
        checkInbox: "Check your inbox. An access link/code was sent. If you cannot find it, check Spam/Junk.",
        loading: "Validating access...",
        noAccess: "This email is not allowed for this apartment.",
        configured: "Access granted for this apartment.",
        logout: "Sign out",
        setupNeeded: "Missing Supabase setup. Fill supabase-config.js first.",
        notConfigured: "Credentials for this apartment are not configured yet.",
        fetchError: "Could not validate right now. Check network/configuration and try again.",
        retry: "Try again",
        switchEmail: "Sign in with another email",
        configUrl: "Project URL",
        configKey: "Anon Key",
        saveConfig: "Save configuration",
        clearConfig: "Clear",
        configSaved: "Configuration saved. Reloading..."
      },
      fr: {
        title: "Acces Wi-Fi par appartement",
        subtitle: "Acces OTP par email pour cet appartement.",
        apt: "Appartement",
        network: "Reseau",
        password: "Mot de passe",
        hidden: "Masque jusqu'a la configuration des identifiants.",
        status: "🔒 Configuration finale en attente",
        note: "Saisissez votre email pour recevoir le lien/code d'acces.",
        emailLabel: "Email du client",
        sendAccess: "Recevoir l'acces par email",
        checkInbox: "Verifiez votre email. Un lien/code d'acces a ete envoye. Si vous ne le trouvez pas, verifiez le dossier Spam/Indesirables.",
        loading: "Validation de l'acces...",
        noAccess: "Cet email n'a pas d'autorisation pour cet appartement.",
        configured: "Acces autorise pour cet appartement.",
        logout: "Se deconnecter",
        setupNeeded: "Configuration Supabase manquante. Completez supabase-config.js.",
        notConfigured: "Identifiants non configures pour cet appartement.",
        fetchError: "Validation impossible pour le moment. Verifiez la connexion/configuration et reessayez.",
        retry: "Reessayer",
        switchEmail: "Se connecter avec un autre email",
        configUrl: "Project URL",
        configKey: "Anon Key",
        saveConfig: "Enregistrer la configuration",
        clearConfig: "Effacer",
        configSaved: "Configuration enregistree. Rechargement..."
      },
      es: {
        title: "Acceso Wi-Fi por apartamento",
        subtitle: "Acceso OTP por email para este apartamento.",
        apt: "Apartamento",
        network: "Red",
        password: "Contrasena",
        hidden: "Oculta hasta configurar credenciales.",
        status: "🔒 Configuracion final pendiente",
        note: "Introduce tu email para recibir el enlace/codigo de acceso.",
        emailLabel: "Email del huesped",
        sendAccess: "Recibir acceso por email",
        checkInbox: "Revisa tu email. Se ha enviado un enlace/codigo de acceso. Si no lo encuentras, revisa Spam/Correo no deseado.",
        loading: "Validando acceso...",
        noAccess: "Este email no tiene permiso para este apartamento.",
        configured: "Acceso autorizado para este apartamento.",
        logout: "Cerrar sesion",
        setupNeeded: "Falta configurar Supabase. Completa supabase-config.js.",
        notConfigured: "Las credenciales de este apartamento aun no estan configuradas.",
        fetchError: "No se pudo validar ahora. Revisa internet/configuracion e intentalo de nuevo.",
        retry: "Intentar de nuevo",
        switchEmail: "Entrar con otro email",
        configUrl: "Project URL",
        configKey: "Anon Key",
        saveConfig: "Guardar configuracion",
        clearConfig: "Limpiar",
        configSaved: "Configuracion guardada. Recargando..."
      },
      de: {
        title: "WLAN-Zugriff pro Apartment",
        subtitle: "E-Mail-OTP-Zugriff fuer dieses Apartment.",
        apt: "Apartment",
        network: "Netzwerk",
        password: "Passwort",
        hidden: "Versteckt bis die Zugangsdaten konfiguriert sind.",
        status: "🔒 Endkonfiguration ausstehend",
        note: "Geben Sie Ihre E-Mail ein, um Link/Code fuer den Zugriff zu erhalten.",
        emailLabel: "Gast-E-Mail",
        sendAccess: "Zugriff per E-Mail erhalten",
        checkInbox: "Postfach pruefen. Ein Zugriffslink/-code wurde gesendet. Falls nicht vorhanden, bitte Spam/Junk pruefen.",
        loading: "Zugriff wird geprueft...",
        noAccess: "Diese E-Mail ist fuer dieses Apartment nicht freigegeben.",
        configured: "Zugriff fuer dieses Apartment erlaubt.",
        logout: "Abmelden",
        setupNeeded: "Supabase ist nicht konfiguriert. Bitte supabase-config.js ausfuellen.",
        notConfigured: "Zugangsdaten fuer dieses Apartment sind noch nicht konfiguriert.",
        fetchError: "Validierung derzeit nicht moeglich. Bitte Internet/Konfiguration pruefen und erneut versuchen.",
        retry: "Erneut versuchen",
        switchEmail: "Mit anderer E-Mail anmelden",
        configUrl: "Project URL",
        configKey: "Anon Key",
        saveConfig: "Konfiguration speichern",
        clearConfig: "Leeren",
        configSaved: "Konfiguration gespeichert. Neu laden..."
      }
    };

    const params = new URLSearchParams(window.location.search);
    const apt = (params.get("apt") || "B").toUpperCase();
    let lang = params.get("lang") || "pt";
    if (!t[lang]) lang = "pt";
    const d = t[lang];

    document.documentElement.lang = lang === "pt" ? "pt-PT" : lang;
    document.getElementById("title").textContent = d.title;
    document.getElementById("subtitle").textContent = d.subtitle;
    document.getElementById("backLink").href = `./detalhe.html?sec=wifi&lang=${lang}`;

    const validApt = /^[B-J]$/.test(apt) ? apt : "B";
    let supabaseUrl = window.WS_SUPABASE_URL || localStorage.getItem("WS_SUPABASE_URL") || "";
    let supabaseAnonKey = window.WS_SUPABASE_ANON_KEY || localStorage.getItem("WS_SUPABASE_ANON_KEY") || "";
    const appOrigin = (window.WS_APP_ORIGIN || localStorage.getItem("WS_APP_ORIGIN") || window.location.origin).replace(/\/+$/, "");
    const content = document.getElementById("content");

    function renderSetupNeeded() {
      content.innerHTML =
        `<p class='line'><strong>${d.apt} ${validApt}</strong> <span class='pill'>${d.status}</span></p>` +
        `<div class='status'>${d.setupNeeded}</div>` +
        `<label class='line' for='cfgUrl'><strong>${d.configUrl}</strong></label>` +
        `<input id='cfgUrl' class='field' type='text' placeholder='https://xxxx.supabase.co' value='${supabaseUrl}' />` +
        `<label class='line' for='cfgKey'><strong>${d.configKey}</strong></label>` +
        `<input id='cfgKey' class='field' type='text' placeholder='eyJhbGciOi...' value='${supabaseAnonKey}' />` +
        `<div class='btn-row'><button id='saveCfgBtn' class='btn primary'>${d.saveConfig}</button><button id='clearCfgBtn' class='btn'>${d.clearConfig}</button></div>`;

      document.getElementById("saveCfgBtn").addEventListener("click", () => {
        const url = (document.getElementById("cfgUrl").value || "").trim();
        const key = (document.getElementById("cfgKey").value || "").trim();
        if (!url || !key) return;
        localStorage.setItem("WS_SUPABASE_URL", url);
        localStorage.setItem("WS_SUPABASE_ANON_KEY", key);
        const msg = document.createElement("div");
        msg.className = "status";
        msg.textContent = d.configSaved;
        content.appendChild(msg);
        setTimeout(() => window.location.reload(), 600);
      });

      document.getElementById("clearCfgBtn").addEventListener("click", () => {
        localStorage.removeItem("WS_SUPABASE_URL");
        localStorage.removeItem("WS_SUPABASE_ANON_KEY");
        document.getElementById("cfgUrl").value = "";
        document.getElementById("cfgKey").value = "";
      });
    }

    if (!supabaseUrl || !supabaseAnonKey) {
      renderSetupNeeded();
    } else {
      const sb = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
      let notice = "";
      async function hardSignOut() {
        try { await sb.auth.signOut(); } catch (_e) {}
        try {
          Object.keys(localStorage).forEach((k) => {
            if (k.startsWith("sb-")) localStorage.removeItem(k);
          });
        } catch (_e) {}
        notice = "";
        window.location.href = `${appOrigin}/wifi-acesso.html?apt=${validApt}&lang=${lang}`;
      }

      function renderLoggedOut() {
        content.innerHTML =
          `<p class='line'><strong>${d.apt} ${validApt}</strong> <span class='pill'>${d.status}</span></p>` +
          `<p class='line muted'>${d.note}</p>` +
          `<label class='line' for='emailInput'><strong>${d.emailLabel}</strong></label>` +
          `<input id='emailInput' class='field' type='email' placeholder='name@email.com' />` +
          `<div class='btn-row'><button id='sendBtn' class='btn primary'>${d.sendAccess}</button></div>` +
          (notice ? `<div class='status'>${notice}</div>` : "");

        document.getElementById("sendBtn").addEventListener("click", async () => {
          const btn = document.getElementById("sendBtn");
          const email = (document.getElementById("emailInput").value || "").trim().toLowerCase();
          if (!email) return;
          btn.disabled = true;
          const redirect = `${appOrigin}/wifi-acesso.html?apt=${validApt}&lang=${lang}`;
          const { error } = await sb.auth.signInWithOtp({
            email,
            options: { emailRedirectTo: redirect }
          });
          btn.disabled = false;
          notice = error ? error.message : d.checkInbox;
          renderLoggedOut();
        });
      }

      function renderDenied() {
        content.innerHTML =
          `<p class='line'><strong>${d.apt} ${validApt}</strong> <span class='pill'>🔒</span></p>` +
          `<div class='status'>${d.noAccess}</div>` +
          `<div class='btn-row'><button id='logoutBtn' class='btn'>${d.logout}</button></div>`;
        document.getElementById("logoutBtn").addEventListener("click", hardSignOut);
      }

      function renderAuthorized(networkName, wifiPassword) {
        content.innerHTML =
          `<p class='line'><strong>${d.apt} ${validApt}</strong> <span class='pill'>✅</span></p>` +
          `<div class='status'>${d.configured}</div>` +
          `<p class='line'><strong>${d.network}:</strong> ${networkName || d.hidden}</p>` +
          `<p class='line'><strong>${d.password}:</strong> ${wifiPassword || d.hidden}</p>` +
          `<div class='btn-row'><button id='logoutBtn' class='btn'>${d.logout}</button></div>`;
        document.getElementById("logoutBtn").addEventListener("click", hardSignOut);
      }

      async function renderAuthenticated(session) {
        if (!session?.user?.email) {
          renderLoggedOut();
          return;
        }

        content.innerHTML = `<p class='line'>${d.loading}</p>`;
        let wifiData;
        try {
          wifiData = await Promise.race([
            sb
              .from("wifi_apartments")
              .select("network_name,wifi_password")
              .eq("apt", validApt)
              .maybeSingle(),
            new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), 12000))
          ]);
        } catch (_err) {
          content.innerHTML =
            `<p class='line'><strong>${d.apt} ${validApt}</strong> <span class='pill'>⚠️</span></p>` +
            `<div class='status'>${d.fetchError}</div>` +
            `<div class='btn-row'><button id='retryBtn' class='btn primary'>${d.retry}</button><button id='switchBtn' class='btn'>${d.switchEmail}</button><button id='logoutBtn' class='btn'>${d.logout}</button></div>`;
          document.getElementById("retryBtn").addEventListener("click", async () => {
            const { data } = await sb.auth.getSession();
            await renderAuthenticated(data.session);
          });
          document.getElementById("switchBtn").addEventListener("click", hardSignOut);
          document.getElementById("logoutBtn").addEventListener("click", hardSignOut);
          return;
        }

        if (wifiData.error || !wifiData.data) {
          content.innerHTML =
            `<p class='line'><strong>${d.apt} ${validApt}</strong> <span class='pill'>⏳</span></p>` +
            `<div class='status'>${d.notConfigured}</div>` +
            `<div class='btn-row'><button id='logoutBtn' class='btn'>${d.logout}</button></div>`;
          document.getElementById("logoutBtn").addEventListener("click", hardSignOut);
          return;
        }

        renderAuthorized(wifiData.data.network_name, wifiData.data.wifi_password);
      }

      sb.auth.onAuthStateChange(async (_event, session) => {
        if (session) {
          await renderAuthenticated(session);
        } else {
          renderLoggedOut();
        }
      });

      sb.auth.getSession().then(async ({ data }) => {
        if (data.session) {
          await renderAuthenticated(data.session);
        } else {
          renderLoggedOut();
        }
      });
    }
  </script>
</body>
</html>

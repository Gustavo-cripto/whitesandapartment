<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>White Sand Apartments | Detalhe</title>
  <style>
    :root {
      --bg: #f0f7ff;
      --panel: #ffffff;
      --text: #1f2a37;
      --muted: #5f6c7b;
      --main: #15b8cc;
      --main-dark: #0b87a2;
      --line: #d8e6f2;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      background-color: #e5d7bb;
      background-image:
        linear-gradient(rgba(244, 248, 255, 0.05), rgba(244, 248, 255, 0.08)),
        url("./fundo-praia.png");
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat, repeat-y;
      background-attachment: scroll;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 16px;
    }
    .hero {
      background: linear-gradient(140deg, rgba(236, 228, 210, 0.92), rgba(231, 221, 200, 0.9));
      color: #1f2a37;
      border-radius: 16px;
      padding: 14px;
      border: 1px solid rgba(168, 151, 120, 0.35);
    }
    .top-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }
    .back {
      text-decoration: none;
      color: #1f2a37;
      border: 1px solid rgba(31, 42, 55, 0.25);
      background: rgba(255, 255, 255, 0.65);
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 700;
    }
    h1 {
      margin: 12px 0 6px;
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    }
    .subtitle { margin: 0; opacity: .94; }
    .card {
      margin-top: 12px;
      background: #e5d7bb;
      border: 1px solid #b79f72;
      border-radius: 14px;
      padding: 14px;
    }
    .list { margin: 0; padding-left: 18px; }
    .list li { margin-bottom: 7px; }
    .line { margin: 6px 0; }
    .amenities-intro {
      margin: 0 0 10px;
      font-size: 1.95rem;
      font-weight: 800;
      line-height: 1.15;
    }
    .amenities-list li {
      font-size: 1.14rem;
      font-weight: 400;
      line-height: 1.25;
      margin-bottom: 8px;
    }
    .wifi-note {
      margin: 0 0 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #b79f72;
      background: rgba(255, 255, 255, 0.35);
      font-weight: 600;
    }
    .wifi-list {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .wifi-item {
      background: #efe3cf;
      border: 1px solid #b79f72;
      border-radius: 12px;
      padding: 10px 12px;
    }
    .wifi-apt {
      margin: 0 0 6px;
      font-weight: 800;
      font-size: 1.02rem;
    }
    .wifi-meta {
      margin: 2px 0;
      font-size: 0.98rem;
    }
    .wifi-lock {
      display: inline-block;
      margin-top: 7px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #5f6c7b;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(31, 42, 55, 0.2);
      border-radius: 999px;
      padding: 2px 8px;
    }
    .wifi-btn {
      display: inline-block;
      margin-top: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      color: #1f2a37;
      background: #f7f5f2;
      border: 1px solid #b79f72;
      border-radius: 999px;
      padding: 6px 10px;
    }
    .wifi-btn:hover {
      background: #fff;
    }
    .link {
      color: #0f7f9d;
      text-decoration: none;
      font-weight: 600;
    }
    .link:hover { text-decoration: underline; }
    .lang-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .lang-btn {
      border: 1px solid rgba(31, 42, 55, 0.35);
      background: rgba(255, 255, 255, 0.9);
      color: #1f2a37;
      border-radius: 999px;
      padding: 4px 10px 6px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 64px;
      min-height: 48px;
      gap: 2px;
    }
    .lang-btn.active {
      background: #1f2a37;
      color: #fff;
      border-color: #1f2a37;
    }
    .lang-flag {
      font-size: 1.15rem;
      line-height: 1;
      display: block;
    }
    .lang-code {
      line-height: 1;
      font-size: 0.82rem;
    }
    .welcome-layout {
      display: grid;
      gap: 14px;
      grid-template-columns: 1.4fr 1fr;
      align-items: stretch;
    }
    .welcome-block {
      background: #e5d7bb;
      border: 1px solid #b79f72;
      border-radius: 10px;
      padding: 16px 18px;
      line-height: 1.6;
      margin: 0;
      min-height: 210px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      text-align: center;
      font-size: clamp(1.03rem, 1.4vw, 1.15rem);
      padding-bottom: 42px;
    }
    .welcome-image-slot {
      background: rgba(255, 255, 255, 0.72);
      border: 2px dashed rgba(31, 42, 55, 0.25);
      border-radius: 12px;
      min-height: 210px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #4b5563;
      font-weight: 600;
      padding: 0;
      overflow: hidden;
    }
    .welcome-image-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .checkin-gallery {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .checkin-gallery img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--line);
      display: block;
      background: #fff;
    }
    .extra-location {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 12px;
      align-items: stretch;
    }
    .extra-location-text {
      margin: 0;
      padding: 14px;
      line-height: 1.55;
      font-weight: 700;
      background: #e5d7bb;
      border: 1px solid #b79f72;
      border-radius: 12px;
    }
    .extra-location-images {
      display: grid;
      gap: 10px;
    }
    .extra-location-images img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--line);
      display: block;
      background: #fff;
    }
    .info-sections {
      display: grid;
      gap: 12px;
    }
    .info-item {
      background: #e5d7bb;
      border: 1px solid #b79f72;
      border-radius: 12px;
      padding: 12px 14px;
    }
    .info-item-title {
      margin: 0 0 6px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .info-item-title .icon {
      font-size: 1.1rem;
      line-height: 1;
    }
    .info-item-text {
      margin: 0;
      line-height: 1.5;
    }
    .rules-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .rule-card {
      background: #efe3cf;
      border: 1px solid rgba(31, 42, 55, 0.08);
      border-radius: 24px;
      padding: 14px 12px 16px;
      min-height: 222px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .rule-num {
      margin: 0;
      font-family: "Bodoni Moda", "Didot", "Times New Roman", Georgia, serif;
      font-size: clamp(3rem, 4vw, 3.35rem);
      line-height: .88;
      font-weight: 500;
      letter-spacing: 1px;
    }
    .rule-title {
      margin: 8px 0 8px;
      text-transform: uppercase;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      letter-spacing: 1.1px;
      font-size: 1.95rem;
      font-weight: 700;
      line-height: .92;
    }
    .rule-text {
      margin: 0;
      line-height: 1.1;
      font-size: 1.07rem;
      max-width: 95%;
    }
    .rule-card.last {
      grid-column: 1 / -1;
      max-width: 300px;
      margin: 0 auto;
    }
    .safety-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .safety-card {
      background: #efe3cf;
      border: 1px solid rgba(31, 42, 55, 0.08);
      border-radius: 24px;
      padding: 14px 16px 16px;
      min-height: auto;
      text-align: left;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
    }
    .safety-bullet {
      display: block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #1f2a37;
      margin: 0 0 10px;
      flex-shrink: 0;
    }
    .safety-title {
      margin: 0 0 6px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: clamp(1.05rem, 2.4vw, 1.35rem);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: 0.02em;
    }
    .safety-detail {
      margin: 0;
      line-height: 1.35;
      font-size: clamp(1rem, 2.2vw, 1.12rem);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .safety-note {
      margin: 10px 0 0;
      line-height: 1.45;
      font-size: clamp(0.85rem, 2vw, 0.95rem);
      font-weight: 500;
      color: #4a5563;
    }
    .transport-wrap {
      text-align: left;
    }
    .transport-wrap .safety-grid {
      margin-top: 0;
    }
    .transport-tabs {
      text-align: left;
    }
    .transport-tabs .safety-grid {
      grid-template-columns: 1fr;
    }
    .transport-tablist {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .transport-tab {
      border: 1px solid #b79f72;
      background: rgba(255, 255, 255, 0.65);
      color: #1f2a37;
      border-radius: 999px;
      padding: 8px 16px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
    }
    .transport-tab--active {
      background: #1f2a37;
      color: #fff;
      border-color: #1f2a37;
    }
    .transport-panel {
      display: none;
    }
    .transport-panel--active {
      display: block;
    }
    .transport-app-downloads {
      margin-top: 10px;
      line-height: 1.55;
    }
    .transport-app-downloads a {
      display: inline-block;
      margin-top: 4px;
    }
    @media (max-width: 760px) {
      .top-row {
        justify-content: flex-start;
      }
      .welcome-layout {
        grid-template-columns: 1fr;
      }
      .welcome-image-slot {
        min-height: 150px;
      }
      .checkin-gallery {
        grid-template-columns: 1fr;
      }
      .extra-location {
        grid-template-columns: 1fr;
      }
      .rules-grid,
      .safety-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .transport-tabs .safety-grid {
        grid-template-columns: 1fr;
      }
      .rule-card.last {
        max-width: none;
      }
      .rule-card {
        min-height: 208px;
        border-radius: 22px;
      }
      .rule-title {
        font-size: clamp(1.18rem, 3.6vw, 1.45rem);
      }
      .rule-text {
        font-size: clamp(0.90rem, 2.8vw, 1rem);
      }
      .amenities-intro {
        font-size: clamp(1.2rem, 4.8vw, 1.5rem);
      }
      .amenities-list li {
        font-size: clamp(1rem, 3.3vw, 1.08rem);
      }
      .wifi-list {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 420px) {
      .rules-grid,
      .safety-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="top-row">
        <a class="back" href="./" data-i18n="back">← Voltar</a>
        <div class="lang-row">
          <button class="lang-btn active" data-lang="pt"><span class="lang-flag">🇵🇹</span><span class="lang-code">PT</span></button>
          <button class="lang-btn" data-lang="en"><span class="lang-flag">🇬🇧</span><span class="lang-code">EN</span></button>
          <button class="lang-btn" data-lang="fr"><span class="lang-flag">🇫🇷</span><span class="lang-code">FR</span></button>
          <button class="lang-btn" data-lang="es"><span class="lang-flag">🇪🇸</span><span class="lang-code">ES</span></button>
          <button class="lang-btn" data-lang="de"><span class="lang-flag">🇩🇪</span><span class="lang-code">DE</span></button>
        </div>
      </div>
      <h1 id="title">Detalhe</h1>
      <p class="subtitle" id="subtitle">Informação do tópico selecionado.</p>
    </section>

    <section class="card" id="content"></section>
  </main>

  <script>
    const text = {
      pt: {
        back: "← Voltar",
        fallbackTitle: "Informação",
        fallbackSubtitle: "Tópico não encontrado.",
        sections: {
          welcome: {
            title: "Bem-vindo",
            subtitle: "Resumo do alojamento White Sand Apartments.",
            html: "<div class='welcome-layout'><p class='welcome-block'>White Sand Apartamentos, totalmente remodelados, com uma decoração moderna, de tipologia T1, T2 e T0, localiza-se numa das zonas mais privilegiadas de Albufeira, perto de todos os serviços e apenas a 300 m da praia! Com todas as comodidades que estes oferecem queremos lhe proporcionar uma ótima experiência para tornar a sua estadia o mais cômoda possível e acima de tudo que descanse e desfrute de umas belas férias!</p><div class='welcome-image-slot'><img src='./welcome-all.png' alt='Apartamento White Sand'></div></div>"
          },
          check: {
            title: "Check-in",
            subtitle: "Horários e processo de entrada.",
            html: "<p class='line'><strong>Check-in:</strong> a partir das 16:00</p><p class='line'>As chaves serão colocadas num pequeno cofre à entrada do prédio. Receberá o código de acesso no dia da sua chegada.</p><div class='checkin-gallery'><img src='./checkin-2.jpg' alt='Entrada do prédio'><img src='./checkin-3.jpg' alt='Entrada e localização'><img src='./checkin-1.jpg' alt='Cofre de chaves'></div>"
          },
          location: {
            title: "Localização",
            subtitle: "Morada e mapa do apartamento.",
            html: "<p class='line'><strong>Morada:</strong> Rua do MFA, n.15 Apto (Letra do seu Apartamento), 8200-157 Albufeira</p><p class='line'><strong>Coordenadas:</strong> 37.0891053, -8.2507170</p><p class='line'><a class='link' target='_blank' rel='noreferrer' href='https://goo.gl/maps/sj565hq985biABaD6'>Abrir no Google Maps</a></p><div class='extra-location'><p class='extra-location-text'>Os apartamentos estão situados no centro histórico de Albufeira, a poucos minutos a pé da Praia dos Pescadores e de outras praias. A localização é excelente, com restaurantes, bares, supermercados e lojas mesmo ao redor, permitindo fazer tudo a pé. A poucos metros encontra também a Praça da Cidade Velha, ruas típicas algarvias, miradouros com vistas incríveis sobre o mar. Ideal para quem quer aproveitar o melhor da cidade, entre praia, animação e sem necessidade de carro.</p><div class='extra-location-images'><img src='./localizacao-1.jpg' alt='Praia em Albufeira'><img src='./localizacao-2.jpg' alt='Centro histórico de Albufeira'></div></div>"
          },
          info: {
            title: "Informação",
            subtitle: "Dados importantes para a estadia.",
            html: "<div class='info-sections'><div class='info-item'><p class='info-item-title'><span class='icon'>🅿️</span>Parque</p><p class='info-item-text'>Na mesma rua onde estamos e nas redondezas poderá estacionar gratuitamente (estacionamento de rua). Tem também um parque pago a 130 metros. Localização parque: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/gmK6iXghkyXu6mPLA'>Abrir localização</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧹</span>Serviço de limpeza</p><p class='info-item-text'>Fornecemos roupa de cama e toalhas de banho para a sua estadia. Para estadias mais longas, ao 8º dia fornecemos gratuitamente troca de roupa e uma breve limpeza.</p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🗑️</span>O lixo - contentores</p><p class='info-item-text'>Existem numa rua mais abaixo contentores específicos para deixar o seu lixo. Localização: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/SYxqfTYpkznRy9Ky6'>Abrir localização</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧾</span>TMT</p><p class='info-item-text'>Taxa turística municipal de Albufeira (2€ por pessoa/noite até máximo de 7 noites), conforme regulamento local. Se o valor do imposto não estiver incluído no valor total da sua reserva, terá de ser feito pagamento, mediante a informação que lhe for enviada.</p></div></div>"
          },
          rules: {
            title: "Regras da casa",
            subtitle: "Regras principais para uma estadia tranquila.",
            html: "<div class='rules-grid'><div class='rule-card'><p class='rule-num'>01</p><p class='rule-title'>Proibido fumar</p><p class='rule-text'>Por favor, não fume dentro do Apartamento. Utiliza o espaço exterior.</p></div><div class='rule-card'><p class='rule-num'>02</p><p class='rule-title'>Sem visitas</p><p class='rule-text'>Sem visitantes não registados. Informe o anfitrião se desejar adicionar convidados ao contrato de aluguer.</p></div><div class='rule-card'><p class='rule-num'>03</p><p class='rule-title'>Sem pets</p><p class='rule-text'>Não permitimos a presença de animais de estimação na propriedade em nenhum momento.</p></div><div class='rule-card'><p class='rule-num'>04</p><p class='rule-title'>Sem festas</p><p class='rule-text'>Não são permitidas festas ou eventos.</p></div><div class='rule-card'><p class='rule-num'>05</p><p class='rule-title'>Danos</p><p class='rule-text'>Por favor, informe imediatamente o anfitrião sobre qualquer dano ou mau funcionamento para que possamos reparar ou substituir o item danificado.</p></div><div class='rule-card'><p class='rule-num'>06</p><p class='rule-title'>Horas de silêncio</p><p class='rule-text'>Para o conforto e usufruto tanto de hóspedes como dos vizinhos, solicitamos que os níveis de ruído sejam reduzidos ao mínimo durante as horas de silêncio.</p></div></div>"
          },
          amenities: {
            title: "Comodidades",
            subtitle: "Equipamentos disponíveis no apartamento.",
            html: "<p class='amenities-intro'>O apartamento está equipado com todas as comodidades de que necessita para uma estadia confortável.</p><ul class='list amenities-list'><li>Wi-Fi</li><li>Televisão Inteligente (Smart TV)</li><li>Máquina de Café</li><li>Secador de Cabelo</li><li>Roupa de Cama</li><li>Toalhas de banho</li><li>Champô e Gel de Banho</li><li>Utensílios de Mesa e cozinha</li><li>Ar Condicionado</li><li>Máquina de Lavar Roupa</li></ul>"
          },
          wifi: {
            title: "Wi-Fi",
            subtitle: "Dados de ligação à internet.",
            html: "<p class='wifi-note'>As credenciais de rede estão ocultas até a ativação do acesso por apartamento.</p><div class='wifi-list'><div class='wifi-item'><p class='wifi-apt'>Apartamento B</p><p class='wifi-meta'><strong>Rede:</strong> Oculta</p><p class='wifi-meta'><strong>Password:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento C</p><p class='wifi-meta'><strong>Rede:</strong> Oculta</p><p class='wifi-meta'><strong>Password:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento D</p><p class='wifi-meta'><strong>Rede:</strong> Oculta</p><p class='wifi-meta'><strong>Password:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento E</p><p class='wifi-meta'><strong>Rede:</strong> Oculta</p><p class='wifi-meta'><strong>Password:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento F</p><p class='wifi-meta'><strong>Rede:</strong> Oculta</p><p class='wifi-meta'><strong>Password:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento G</p><p class='wifi-meta'><strong>Rede:</strong> Oculta</p><p class='wifi-meta'><strong>Password:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento H</p><p class='wifi-meta'><strong>Rede:</strong> Oculta</p><p class='wifi-meta'><strong>Password:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento I</p><p class='wifi-meta'><strong>Rede:</strong> Oculta</p><p class='wifi-meta'><strong>Password:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento J</p><p class='wifi-meta'><strong>Rede:<       en: {
        back: "← Back",
        fallbackTitle: "Information",
        fallbackSubtitle: "Topic not found.",
        sections: {
          welcome: { title: "Welcome", subtitle: "White Sand Apartments overview.", html: "<div class='welcome-layout'><p class='welcome-block'>White Sand Apartments, totally refurbished, with a modern decoration, of type T1, T2 and T0, located in one of the most privileged areas of Albufeira, close to all services and just 300 m from the beach! With all the amenities that these offer we want to provide you with a great experience to make your stay as comfortable as possible and above all that you rest and enjoy a beautiful vacation!</p><div class='welcome-image-slot'><img src='./welcome-all.png' alt='White Sand apartment'></div></div>" },
          check: { title: "Check-in", subtitle: "Arrival details.", html: "<p class='line'><strong>Check-in:</strong> from 16:00</p><p class='line'>The keys will be placed in a small lockbox at the building entrance, and you will receive the access code on your arrival day.</p><div class='checkin-gallery'><img src='./checkin-2.jpg' alt='Building entrance'><img src='./checkin-3.jpg' alt='Building location'><img src='./checkin-1.jpg' alt='Key lockbox'></div>" },
          location: { title: "Location", subtitle: "Address and map.", html: "<p class='line'><strong>Address:</strong> Rua do MFA, n.15 Apto (Your Apartment Letter), 8200-157 Albufeira</p><p class='line'><strong>Coordinates:</strong> 37.0891053, -8.2507170</p><p class='line'><a class='link' target='_blank' rel='noreferrer' href='https://goo.gl/maps/sj565hq985biABaD6'>Open in Google Maps</a></p><div class='extra-location'><p class='extra-location-text'>The apartments are located in the historic center of Albufeira, just a few minutes on foot from Praia dos Pescadores and other beaches. The location is excellent, with restaurants, bars, supermarkets, and shops all around, making it easy to do everything on foot. A few meters away you will also find the Old Town Square, typical Algarve streets, and viewpoints with incredible sea views. Ideal for those who want to enjoy the best of the city, combining beach and entertainment without needing a car.</p><div class='extra-location-images'><img src='./localizacao-1.jpg' alt='Beach in Albufeira'><img src='./localizacao-2.jpg' alt='Albufeira historic center'></div></div>" },
          info: { title: "Information", subtitle: "Important stay details.", html: "<div class='info-sections'><div class='info-item'><p class='info-item-title'><span class='icon'>🅿️</span>Parking</p><p class='info-item-text'>On our street and in the nearby area you can park for free (street parking). There is also a paid parking area 130 meters away. Parking location: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/gmK6iXghkyXu6mPLA'>Open location</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧹</span>Cleaning service</p><p class='info-item-text'>We provide bed linen and bath towels for your stay. For longer stays, on the 8th day we provide a free linen change and a brief cleaning service.</p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🗑️</span>Waste bins</p><p class='info-item-text'>There are specific bins in a street below for you to dispose of your waste. Location: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/SYxqfTYpkznRy9Ky6'>Open location</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧾</span>TMT</p><p class='info-item-text'>Municipal tourist tax in Albufeira (€2 per person/night up to a maximum of 7 nights), according to local regulations. If this tax is not included in your reservation total, payment will be required according to the information sent to you.</p></div></div>" },
          rules: { title: "House rules", subtitle: "Main rules for a peaceful stay.", html: "<div class='rules-grid'><div class='rule-card'><p class='rule-num'>01</p><p class='rule-title'>No smoking</p><p class='rule-text'>Please do not smoke or vape inside or around the apartment.</p></div><div class='rule-card'><p class='rule-num'>02</p><p class='rule-title'>No visitors</p><p class='rule-text'>No unregistered visitors. Please inform the host if you want to add extra guests to your booking.</p></div><div class='rule-card'><p class='rule-num'>03</p><p class='rule-title'>No pets</p><p class='rule-text'>Pets are not allowed on the property at any time.</p></div><div class='rule-card'><p class='rule-num'>04</p><p class='rule-title'>No parties</p><p class='rule-text'>Parties or events are not allowed.</p></div><div class='rule-card'><p class='rule-num'>05</p><p class='rule-title'>Damages</p><p class='rule-text'>Please report any damage or malfunction to the host immediately so we can repair or replace the affected item.</p></div><div class='rule-card'><p class='rule-num'>06</p><p class='rule-title'>Quiet hours</p><p class='rule-text'>For the comfort and enjoyment of both guests and neighbors, we kindly ask that noise levels be kept to a minimum during quiet hours.</p></div></div>" },
          amenities: { title: "Amenities", subtitle: "Apartment facilities available.", html: "<p class='amenities-intro'>The apartment is equipped with all the amenities you need for a comfortable stay.</p><ul class='list amenities-list'><li>Wi-Fi</li><li>Smart TV</li><li>Coffee Machine</li><li>Hair Dryer</li><li>Bed Linen</li><li>Bath Towels</li><li>Shampoo and Shower Gel</li><li>Tableware and Kitchen Utensils</li><li>Air Conditioning</li><li>Washing Machine</li></ul>" },
          wifi: { title: "Wi-Fi", subtitle: "Internet access details.", html: "<p class='wifi-note'>Network credentials are hidden until apartment-based access is activated.</p><div class='wifi-list'><div class='wifi-item'><p class='wifi-apt'>Apartment B</p><p class='wifi-meta'><strong>Network:</strong> Hidden</p><p class='wifi-meta'><strong>Password:</strong> Hidden</p><span class='wifi-lock'>🔒 Locked</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment C</p><p class='wifi-meta'><strong>Network:</strong> Hidden</p><p class='wifi-meta'><strong>Password:</strong> Hidden</p><span class='wifi-lock'>🔒 Locked</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment D</p><p class='wifi-meta'><strong>Network:</strong> Hidden</p><p class='wifi-meta'><strong>Password:</strong> Hidden</p><span class='wifi-lock'>🔒 Locked</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment E</p><p class='wifi-meta'><strong>Network:</strong> Hidden</p><p class='wifi-meta'><strong>Password:</strong> Hidden</p><span class='wifi-lock'>🔒 Locked</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment F</p><p class='wifi-meta'><strong>Network:</strong> Hidden</p><p class='wifi-meta'><strong>Password:</strong> Hidden</p><span class='wifi-lock'>🔒 Locked</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment G</p><p class='wifi-meta'><strong>Network:</strong> Hidden</p><p class='wifi-meta'><strong>Password:</strong> Hidden</p><span class='wifi-lock'>🔒 Locked</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment H</p><p class='wifi-meta'><strong>Network:</strong> Hidden</p><p class='wifi-meta'><strong>Password:</strong> Hidden</p><span class='wifi-lock'>🔒 Locked</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment I</p><p class='wifi-meta'><strong>Network:</strong> Hidden</p><p class='wifi-meta'><strong>Password:</strong> Hidden</p><span class='wifi-lock'>🔒 Locked</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment J</       fr: {
        back: "← Retour",
        fallbackTitle: "Information",
        fallbackSubtitle: "Sujet introuvable.",
        sections: {
          welcome: { title: "Bienvenue", subtitle: "Resume de l'hebergement.", html: "<div class='welcome-layout'><p class='welcome-block'>Appartements White Sand, totalement rénovés, avec une décoration moderne, de type T1, T2 et T0, situés dans l'un des quartiers les plus privilégiés d'Albufeira, à proximité de tous les services et à seulement 300 m de la plage! Avec toutes les commodités que celles-ci offrent, nous voulons vous offrir une expérience formidable pour rendre votre séjour aussi confortable que possible et surtout que vous vous reposiez et passiez de belles vacances!</p><div class='welcome-image-slot'><img src='./welcome-all.png' alt='Appartement White Sand'></div></div>" },
          check: { title: "Check-in", subtitle: "Details d'arrivee.", html: "<p class='line'><strong>Check-in:</strong> a partir de 16:00</p><p class='line'>Les cles seront placees dans un petit coffre a l'entree de l'immeuble, et vous recevrez le code d'acces le jour de votre arrivee.</p><div class='checkin-gallery'><img src='./checkin-2.jpg' alt='Entree du batiment'><img src='./checkin-3.jpg' alt='Localisation de l entree'><img src='./checkin-1.jpg' alt='Boite a cles'></div>" },
          location: { title: "Localisation", subtitle: "Adresse et carte.", html: "<p class='line'><strong>Adresse:</strong> Rua do MFA, n.15 Apto (Lettre de votre appartement), 8200-157 Albufeira</p><p class='line'><strong>Coordonnees:</strong> 37.0891053, -8.2507170</p><p class='line'><a class='link' target='_blank' rel='noreferrer' href='https://goo.gl/maps/sj565hq985biABaD6'>Ouvrir sur Google Maps</a></p><div class='extra-location'><p class='extra-location-text'>Les appartements sont situes dans le centre historique d'Albufeira, a quelques minutes a pied de Praia dos Pescadores et d'autres plages. L'emplacement est excellent, avec des restaurants, bars, supermarches et boutiques tout autour, ce qui permet de tout faire a pied. A quelques metres, vous trouverez aussi la place de la vieille ville, des rues typiques de l'Algarve et des points de vue incroyables sur la mer. Ideal pour ceux qui veulent profiter du meilleur de la ville, entre plage et animation, sans avoir besoin de voiture.</p><div class='extra-location-images'><img src='./localizacao-1.jpg' alt='Plage a Albufeira'><img src='./localizacao-2.jpg' alt='Centre historique d Albufeira'></div></div>" },
          info: { title: "Information", subtitle: "Informations importantes du sejour.", html: "<div class='info-sections'><div class='info-item'><p class='info-item-title'><span class='icon'>🅿️</span>Parking</p><p class='info-item-text'>Dans notre rue et aux alentours, vous pouvez vous garer gratuitement (stationnement dans la rue). Il existe aussi un parking payant a 130 metres. Localisation du parking: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/gmK6iXghkyXu6mPLA'>Ouvrir la localisation</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧹</span>Service de nettoyage</p><p class='info-item-text'>Nous fournissons les draps et les serviettes de bain pour votre sejour. Pour les sejours plus longs, au 8e jour nous offrons gratuitement un changement de linge et un bref nettoyage.</p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🗑️</span>Dechets - conteneurs</p><p class='info-item-text'>Dans une rue en dessous, vous trouverez des conteneurs specifiques pour deposer vos dechets. Localisation: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/SYxqfTYpkznRy9Ky6'>Ouvrir la localisation</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧾</span>TMT</p><p class='info-item-text'>Taxe touristique municipale d'Albufeira (2€ par personne/nuit jusqu'a un maximum de 7 nuits), conformement au reglement local. Si cette taxe n'est pas incluse dans le montant total de votre reservation, le paiement devra etre effectue selon les informations qui vous seront envoyees.</p></div></div>" },
          rules: { title: "Regles de la maison", subtitle: "Regles principales pour un sejour paisible.", html: "<div class='rules-grid'><div class='rule-card'><p class='rule-num'>01</p><p class='rule-title'>Interdit de fumer</p><p class='rule-text'>Merci de ne pas fumer ni vapoter a l'interieur ou autour de l'appartement.</p></div><div class='rule-card'><p class='rule-num'>02</p><p class='rule-title'>Sans visites</p><p class='rule-text'>Aucun visiteur non enregistre. Informez l'hote si vous souhaitez ajouter des invites a la reservation.</p></div><div class='rule-card'><p class='rule-num'>03</p><p class='rule-title'>Sans animaux</p><p class='rule-text'>Les animaux de compagnie ne sont pas autorises dans la propriete.</p></div><div class='rule-card'><p class='rule-num'>04</p><p class='rule-title'>Sans fetes</p><p class='rule-text'>Les fetes ou evenements ne sont pas autorises.</p></div><div class='rule-card'><p class='rule-num'>05</p><p class='rule-title'>Dommages</p><p class='rule-text'>Veuillez signaler immediatement tout dommage ou dysfonctionnement a l'hote afin que nous puissions reparer ou remplacer l'article endommage.</p></div><div class='rule-card'><p class='rule-num'>06</p><p class='rule-title'>Heures de silence</p><p class='rule-text'>Pour le confort et le bien-etre des hotes et des voisins, nous vous demandons de reduire le bruit au minimum pendant les heures de silence.</p></div></div>" },
          amenities: { title: "Commodites", subtitle: "Equipements disponibles.", html: "<p class='amenities-intro'>L'appartement est equipe de toutes les commodites necessaires pour un sejour confortable.</p><ul class='list amenities-list'><li>Wi-Fi</li><li>Television intelligente (Smart TV)</li><li>Machine a cafe</li><li>Seche-cheveux</li><li>Linge de lit</li><li>Serviettes de bain</li><li>Shampooing et gel douche</li><li>Vaisselle et ustensiles de cuisine</li><li>Climatisation</li><li>Machine a laver</li></ul>" },
          wifi: { title: "Wi-Fi", subtitle: "Acces internet.", html: "<p class='wifi-note'>Les identifiants reseau sont masques jusqu'a l'activation de l'acces par appartement.</p><div class='wifi-list'><div class='wifi-item'><p class='wifi-apt'>Appartement B</p><p class='wifi-meta'><strong>Reseau:</strong> Masque</p><p class='wifi-meta'><strong>Mot de passe:</strong> Masque</p><span class='wifi-lock'>🔒 Verrouille</span></div><div class='wifi-item'><p class='wifi-apt'>Appartement C</p><p class='wifi-meta'><strong>Reseau:</strong> Masque</p><p class='wifi-meta'><strong>Mot de passe:</strong> Masque</p><span class='wifi-lock'>🔒 Verrouille</span></div><div class='wifi-item'><p class='wifi-apt'>Appartement D</p><p class='wifi-meta'><strong>Reseau:</strong> Masque</p><p class='wifi-meta'><strong>Mot de passe:</strong> Masque</p><span class='wifi-lock'>🔒 Verrouille</span></div><div class='wifi-item'><p class='wifi-apt'>Appartement E</p><p class='wifi-meta'><strong>Reseau:</strong> Masque</p><p class='wifi-meta'><strong>Mot de passe:</strong> Masque</p><span class='wifi-lock'>🔒 Verrouille</span></div><div class='wifi-item'><p class='wifi-apt'>Appartement F</p><p class='wifi-meta'><strong>Reseau:</strong> Masque</p><p class='wifi-meta'><strong>Mot de passe:</strong> Masque</p><span class='wifi-lock'>🔒 Verrouille</span></div><div class='wifi-item'><p class='wifi-apt'>Appartement G</p><p class='wifi-meta'><strong>Reseau:</strong> Masque</p><p class='wifi-meta'><strong>Mot de passe:</strong> Masque</p><span class='wifi-lock'>🔒 Verrouille</span></div><div class='wifi-item'><p class='wifi-apt'>Appartement H</p><p class='wifi-meta'><strong>Reseau:</strong> Masque</p><p class='wifi-meta'><strong>Mot de passe:</strong> Masque</p><span class='wifi-lock'>🔒 Verrouille</span></div><div class='wifi-item'><p class='wifi-apt'>Appartement I</p><p class='wifi-meta'><strong>Reseau:</strong> Masque</p><p class='wifi-meta'><strong>Mot de passe:</strong> Masque</p><span class='wifi-lock'>🔒 Verrouille</span></div><div class='wifi-item'><p class='wifi-apt'>Appartement J</p><p class='wifi-meta'><strong>Reseau:</strong> Masque</p><p class='wifi-meta'><strong>Mot de passe:</strong> Masque</p><span class='wifi-lock'>🔒 Verrouille</span></div></div>" },
          safety: { title: "Securite", subtitle: "Urgences et contacts utiles.", html: "<div class='safety-grid'><div class='safety-card'><span class='safety-bullet' aria-hidden='true'></span><p class='safety-title'>Urgence</p><p class='safety-detail'>112</p><p class='safety-note'>Disponible 24h/24, tous les jours.<br>Le 112 est le numéro d'urgence européen unique, disponible dans toute l'Union européenne.<br>Les appels sont gratuits.</p></div><div class='safety-card'><span class='safety-bullet' aria-hidden='true'></span><p class='safety-title'>Ligne sante</p><p class='safety-detail'>808 24 24 24</p><p class='safety-note'>Disponible 24h/24, tous les jours.<br>Le 112 est le numéro d'urgence européen unique, disponible dans toute l'Union européenne.<br>Les appels sont gratuits.</p></div><div class='safety-card'><span class='safety-bullet' aria-hidden='true'></span><p class='safety-title'>Hopital Lusíadas Albufeira</p><p class='safety-detail'>289 892 040</p></div><div class='safety-card'><span class='safety-bullet' aria-hidden='true'></span><p class='safety-title'>Pompiers</p><p class='safety-detail'>289 586 333</p></div><div class='safety-card'><span class='safety-bullet' aria-hidden='true'></span><p class='safety-title'>Police</p><p class='safety-detail'>289 590 790</p></div></div>" },

          checkout: { title: "Check-out", subtitle: "Avant de quitter l'appartement.", html: "<ul class='list'><li>Check-out entre 08:00 et 10:00.</li><li>Fermer les fenetres et eteindre lumiere/climatisation.</li><li>Laisser les cles selon les instructions.</li></ul>" },

      es: {
        back: "← Volver",
        fallbackTitle: "Informacion",
        fallbackSubtitle: "Tema no encontrado.",
        sections: {
          welcome: { title: "Bienvenido", subtitle: "Resumen del alojamiento White Sand Apartments.", html: "<div class='welcome-layout'><p class='welcome-block'>Apartamentos White Sand, totalmente reformados, con una decoración moderna, de tipo T1, T2 y T0, situados en una de las zonas más privilegiadas de Albufeira, cerca de todos los servicios y a tan solo 300 m de la playa! Con todas las comodidades que estos ofrecen queremos brindarte una gran experiencia para que tu estadía sea lo más cómoda posible y sobre todo que descanses y disfrutes de unas hermosas vacaciones!</p><div class='welcome-image-slot'><img src='./welcome-all.png' alt='Apartamento White Sand'></div></div>" },
          check: { title: "Check-in", subtitle: "Detalles de llegada.", html: "<p class='line'><strong>Check-in:</strong> a partir de las 16:00</p><p class='line'>Las llaves se colocaran en una pequena caja de seguridad en la entrada del edificio, y recibiras el codigo de acceso el dia de tu llegada.</p><div class='checkin-gallery'><img src='./checkin-2.jpg' alt='Entrada del edificio'><img src='./checkin-3.jpg' alt='Ubicacion de entrada'><img src='./checkin-1.jpg' alt='Caja de llaves'></div>" },
          location: { title: "Ubicacion", subtitle: "Direccion y mapa.", html: "<p class='line'><strong>Direccion:</strong> Rua do MFA, n.15 Apto (Letra de su apartamento), 8200-157 Albufeira</p><p class='line'><strong>Coordenadas:</strong> 37.0891053, -8.2507170</p><p class='line'><a class='link' target='_blank' rel='noreferrer' href='https://goo.gl/maps/sj565hq985biABaD6'>Abrir en Google Maps</a></p><div class='extra-location'><p class='extra-location-text'>Los apartamentos estan ubicados en el centro historico de Albufeira, a pocos minutos a pie de Praia dos Pescadores y de otras playas. La ubicacion es excelente, con restaurantes, bares, supermercados y tiendas alrededor, permitiendo hacer todo a pie. A pocos metros tambien encontraras la Plaza del Casco Antiguo, calles tipicas del Algarve y miradores con vistas increibles al mar. Ideal para quien quiere aprovechar lo mejor de la ciudad, entre playa y animacion, sin necesidad de coche.</p><div class='extra-location-images'><img src='./localizacao-1.jpg' alt='Playa en Albufeira'><img src='./localizacao-2.jpg' alt='Centro historico de Albufeira'></div></div>" },
          info: { title: "Informacion", subtitle: "Datos importantes para la estancia.", html: "<div class='info-sections'><div class='info-item'><p class='info-item-title'><span class='icon'>🅿️</span>Aparcamiento</p><p class='info-item-text'>En nuestra calle y en los alrededores podras aparcar gratuitamente (aparcamiento en la calle). Tambien hay un aparcamiento de pago a 130 metros. Ubicacion del aparcamiento: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/gmK6iXghkyXu6mPLA'>Abrir ubicacion</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧹</span>Servicio de limpieza</p><p class='info-item-text'>Proporcionamos ropa de cama y toallas de bano para su estancia. Para estancias mas largas, en el 8o dia ofrecemos gratuitamente cambio de ropa y una breve limpieza.</p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🗑️</span>Basura - contenedores</p><p class='info-item-text'>En una calle mas abajo hay contenedores especificos para dejar su basura. Ubicacion: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/SYxqfTYpkznRy9Ky6'>Abrir ubicacion</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧾</span>TMT</p><p class='info-item-text'>Tasa turistica municipal de Albufeira (2€ por persona/noche hasta un maximo de 7 noches), conforme a la normativa local. Si este impuesto no esta incluido en el importe total de su reserva, el pago debera realizarse segun la informacion que se le enviara.</p></div></div>" },
          rules: { title: "Normas de la casa", subtitle: "Normas principales para una estancia tranquila.", html: "<div class='rules-grid'><div class='rule-card'><p class='rule-num'>01</p><p class='rule-title'>Prohibido fumar</p><p class='rule-text'>Por favor, no fume ni vapee dentro o en los alrededores del apartamento.</p></div><div class='rule-card'><p class='rule-num'>02</p><p class='rule-title'>Sin visitas</p><p class='rule-text'>No se permiten visitas no registradas. Informe al anfitrion si desea agregar huespedes a su reserva.</p></div><div class='rule-card'><p class='rule-num'>03</p><p class='rule-title'>Sin mascotas</p><p class='rule-text'>No se permiten mascotas en la propiedad en ningun momento.</p></div><div class='rule-card'><p class='rule-num'>04</p><p class='rule-title'>Sin fiestas</p><p class='rule-text'>No se permiten fiestas ni eventos.</p></div><div class='rule-card'><p class='rule-num'>05</p><p class='rule-title'>Danos</p><p class='rule-text'>Por favor, informe de inmediato al anfitrion sobre cualquier dano o averia para poder reparar o sustituir el elemento afectado.</p></div><div class='rule-card'><p class='rule-num'>06</p><p class='rule-title'>Horas de silencio</p><p class='rule-text'>Para la comodidad y disfrute tanto de los huespedes como de los vecinos, solicitamos que los niveles de ruido se mantengan al minimo durante las horas de silencio.</p></div></div>" },
          amenities: { title: "Comodidades", subtitle: "Equipamiento disponible en el apartamento.", html: "<p class='amenities-intro'>El apartamento está equipado con todas las comodidades que necesita para una estancia cómoda.</p><ul class='list amenities-list'><li>Wi-Fi</li><li>Televisión Inteligente (Smart TV)</li><li>Máquina de Café</li><li>Secador de Pelo</li><li>Ropa de Cama</li><li>Toallas de baño</li><li>Champú y Gel de Ducha</li><li>Utensilios de Mesa y Cocina</li><li>Aire Acondicionado</li><li>Lavadora</li></ul>" },
          wifi: { title: "Wi-Fi", subtitle: "Datos de conexion a internet.", html: "<p class='wifi-note'>Las credenciales de red estan ocultas hasta activar el acceso por apartamento.</p><div class='wifi-list'><div class='wifi-item'><p class='wifi-apt'>Apartamento B</p><p class='wifi-meta'><strong>Red:</strong> Oculta</p><p class='wifi-meta'><strong>Contrasena:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento C</p><p class='wifi-meta'><strong>Red:</strong> Oculta</p><p class='wifi-meta'><strong>Contrasena:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento D</p><p class='wifi-meta'><strong>Red:</strong> Oculta</p><p class='wifi-meta'><strong>Contrasena:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento E</p><p class='wifi-meta'><strong>Red:</strong> Oculta</p><p class='wifi-meta'><strong>Contrasena:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento F</p><p class='wifi-meta'><strong>Red:</strong> Oculta</p><p class='wifi-meta'><strong>Contrasena:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento G</p><p class='wifi-meta'><strong>Red:</strong> Oculta</p><p class='wifi-meta'><strong>Contrasena:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento H</p><p class='wifi-meta'><strong>Red:</strong> Oculta</p><p class='wifi-meta'><strong>Contrasena:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento I</p><p class='wifi-meta'><strong>Red:</strong> Oculta</p><p class='wifi-meta'><strong>Contrasena:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div><div class='wifi-item'><p class='wifi-apt'>Apartamento J</p><p class='wifi-meta'><strong>Red:</strong> Oculta</p><p class='wifi-meta'><strong>Contrasena:</strong> Oculta</p><span class='wifi-lock'>🔒 Bloqueado</span></div></div>" },
          safety: { title: "Seguridad", subtitle: "Emergencias y contactos utiles.", html: "<div class='safety-grid'><div class='safety-card'><span class='safety-bullet' aria-hidden='true'></span><p class='safety-title'>Emergencia</p><p class='safety-detail'>112</p><p class='safety-note'>Disponible las 24 horas del día, todos los días.<br>El 112 es el número único europeo de emergencias, disponible en toda la Unión Europea.<br>Las llamadas son gratuitas.</p></div><div class='safety-card'><span class='safety-bullet' aria-hidden='true'></span><p class='safety-title'>Linea de salud</p><p class='safety-detail'>808 24 24 24</p><p class='safety-note'>Disponible las 24 horas del día, todos los días.<br>El 112 es el número único europeo de emergencias, disponible en toda la Unión Europea.<br>Las llamadas son gratuitas.</p></div><div class='safety-card'><span class='safety-bullet' aria-hidden='true'></span><p class='safety-title'>Hospital Lusíadas Albufeira</p><p class='safety-detail'>289 892 040</p></div><div class='safety-card'><span class='safety-bullet' aria-hidden='true'></span><p class='safety-title'>Bomberos</p><p class='safety-detail'>289 586 333</p></div><div class='safety-card'><span class='safety-bullet' aria-hidden='true'></span><p class='safety-title'>Policia</p><p class='safety-detail'>289 590 790</p></div></div>" },

      de: {
        back: "← Zurueck",
        fallbackTitle: "Information",
        fallbackSubtitle: "Thema nicht gefunden.",
        sections: {
          welcome: { title: "Willkommen", subtitle: "Ueberblick ueber die Unterkunft.", html: "<div class='welcome-layout'><p class='welcome-block'>White Sand Apartments, komplett renoviert und modern eingerichtet, in den Typen T1, T2 und T0, befinden sich in einer der privilegiertesten Gegenden von Albufeira, nahe aller Dienstleistungen und nur 300 m vom Strand entfernt! Mit allen angebotenen Annehmlichkeiten moechten wir dir ein grossartiges Erlebnis bieten, damit dein Aufenthalt so komfortabel wie moeglich ist und du vor allem ausruhst und einen wunderschoenen Urlaub geniesst!</p><div class='welcome-image-slot'><img src='./welcome-all.png' alt='White Sand Wohnung'></div></div>" },
          check: { title: "Check-in", subtitle: "Anreiseinformationen.", html: "<p class='line'><strong>Check-in:</strong> ab 16:00</p><p class='line'>Die Schluessel werden in einem kleinen Schluesseltresor am Gebaeudeeingang hinterlegt, und du erhaeltst den Zugangscode am Tag deiner Anreise.</p><div class='checkin-gallery'><img src='./checkin-2.jpg' alt='Gebaeudeeingang'><img src='./checkin-3.jpg' alt='Eingangsposition'><img src='./checkin-1.jpg' alt='Schluesseltresor'></div>" },
          location: { title: "Lage", subtitle: "Adresse und Karte.", html: "<p class='line'><strong>Adresse:</strong> Rua do MFA, n.15 Apto (Buchstabe Ihrer Wohnung), 8200-157 Albufeira</p><p class='line'><strong>Koordinaten:</strong> 37.0891053, -8.2507170</p><p class='line'><a class='link' target='_blank' rel='noreferrer' href='https://goo.gl/maps/sj565hq985biABaD6'>In Google Maps oeffnen</a></p><div class='extra-location'><p class='extra-location-text'>Die Apartments liegen im historischen Zentrum von Albufeira, nur wenige Gehminuten von der Praia dos Pescadores und anderen Straenden entfernt. Die Lage ist ausgezeichnet, mit Restaurants, Bars, Supermaerkten und Geschaeften direkt in der Umgebung, sodass man alles zu Fuss erledigen kann. Nur wenige Meter entfernt befinden sich auch der Platz der Altstadt, typische Algarve-Gassen und Aussichtspunkte mit beeindruckendem Meerblick. Ideal fuer alle, die das Beste der Stadt zwischen Strand und Unterhaltung geniessen moechten, ohne ein Auto zu brauchen.</p><div class='extra-location-images'><img src='./localizacao-1.jpg' alt='Strand in Albufeira'><img src='./localizacao-2.jpg' alt='Historisches Zentrum von Albufeira'></div></div>" },
          info: { title: "Information", subtitle: "Wichtige Infos fuer den Aufenthalt.", html: "<div class='info-sections'><div class='info-item'><p class='info-item-title'><span class='icon'>🅿️</span>Parken</p><p class='info-item-text'>In unserer Strasse und in der Umgebung koennen Sie kostenlos parken (Strassenparkplaetze). Es gibt auch einen kostenpflichtigen Parkplatz in 130 Metern Entfernung. Parkplatz-Standort: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/gmK6iXghkyXu6mPLA'>Standort oeffnen</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧹</span>Reinigungsservice</p><p class='info-item-text'>Wir stellen Bettwaesche und Badetuecher fuer Ihren Aufenthalt bereit. Bei laengeren Aufenthalten bieten wir am 8. Tag kostenlos einen Waeschewechsel und eine kurze Reinigung an.</p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🗑️</span>Muell - Container</p><p class='info-item-text'>In einer Strasse weiter unten gibt es spezielle Container zur Entsorgung Ihres Muells. Standort: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/SYxqfTYpkznRy9Ky6'>Standort oeffnen</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧾</span>TMT</p><p class='info-item-text'>Kommunale Tourismussteuer von Albufeira (2€ pro Person/Nacht bis maximal 7 Naechte), gemaess den lokalen Bestimmungen. Falls diese Steuer nicht im Gesamtbetrag Ihrer Buchung enthalten ist, muss die Zahlung gemaess den Ihnen zugesendeten Informationen erfolgen.</p></div></div>" },
          rules: { title: "Hausregeln", subtitle: "Wichtige Regeln fuer einen ruhigen Aufenthalt.", html: "<div class='rules-grid'><div class='rule-card'><p class='rule-num'>01</p><p class='rule-title'>Rauchen verboten</p><p class='rule-text'>Bitte nicht in oder rund um die Wohnung rauchen oder vapen.</p></div><div class='rule-card'><p class='rule-num'>02</p><p class='rule-title'>Keine Besucher</p><p class='rule-text'>Keine nicht registrierten Besucher. Informieren Sie den Gastgeber, wenn Sie weitere Gaeste zur Buchung hinzufuegen moechten.</p></div><div class='rule-card'><p class='rule-num'>03</p><p class='rule-title'>Keine Haustiere</p><p class='rule-text'>Haustiere sind auf dem gesamten Grundstueck nicht erlaubt.</p></div><div class='rule-card'><p class='rule-num'>04</p><p class='rule-title'>Keine Partys</p><p class='rule-text'>Partys oder Veranstaltungen sind nicht erlaubt.</p></div><div class='rule-card'><p class='rule-num'>05</p><p class='rule-title'>Schaeden</p><p class='rule-text'>Bitte melden Sie Schaeden oder Stoerungen sofort dem Gastgeber, damit wir den betroffenen Gegenstand reparieren oder ersetzen koennen.</p></div><div class='rule-card'><p class='rule-num'>06</p><p class='rule-title'>Ruhezeiten</p><p class='rule-text'>Fuer den Komfort und das Wohlbefinden von Gaesten und Nachbarn bitten wir darum, den Geraeuschpegel waehrend der Ruhezeiten auf ein Minimum zu reduzieren.</p></div></div>" },
          amenities: { title: "Komfort", subtitle: "Ausstattung der Unterkunft.", html: "<p class='amenities-intro'>Die Wohnung ist mit allen Annehmlichkeiten ausgestattet, die Sie fuer einen komfortablen Aufenthalt benoetigen.</p><ul class='list amenities-list'><li>Wi-Fi</li><li>Smart-TV</li><li>Kaffeemaschine</li><li>Haartrockner</li><li>Bettwaesche</li><li>Badetuecher</li><li>Shampoo und Duschgel</li><li>Tischgeschirr und Kuechenutensilien</li><li>Klimaanlage</li><li>Waschmaschine</li></ul>" },
          wifi: { title: "Wi-Fi", subtitle: "Internetzugang.", html: "<p class='wifi-note'>Die Netzwerkdaten sind ausgeblendet, bis der wohnungsbezogene Zugriff aktiviert ist.</p><div class='wifi-list'><div class='wifi-item'><p class='wifi-apt'>Apartment B</p><p class='wifi-meta'><strong>Netzwerk:</strong> Versteckt</p><p class='wifi-meta'><strong>Passwort:</strong> Versteckt</p><span class='wifi-lock'>🔒 Gesperrt</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment C</p><p class='wifi-meta'><strong>Netzwerk:</strong> Versteckt</p><p class='wifi-meta'><strong>Passwort:</strong> Versteckt</p><span class='wifi-lock'>🔒 Gesperrt</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment D</p><p class='wifi-meta'><strong>Netzwerk:</strong> Versteckt</p><p class='wifi-meta'><strong>Passwort:</strong> Versteckt</p><span class='wifi-lock'>🔒 Gesperrt</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment E</p><p class='wifi-meta'><strong>Netzwerk:</strong> Versteckt</p><p class='wifi-meta'><strong>Passwort:</strong> Versteckt</p><span class='wifi-lock'>🔒 Gesperrt</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment F</p><p class='wifi-meta'><strong>Netzwerk:</strong> Versteckt</p><p class='wifi-meta'><strong>Passwort:</strong> Versteckt</p><span class='wifi-lock'>🔒 Gesperrt</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment G</p><p class='wifi-meta'><strong>Netzwerk:</strong> Versteckt</p><p class='wifi-meta'><strong>Passwort:</strong> Versteckt</p><span class='wifi-lock'>🔒 Gesperrt</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment H</p><p class='wifi-meta'><strong>Netzwerk:</strong> Versteckt</p><p class='wifi-meta'><strong>Passwort:</strong> Versteckt</p><span class='wifi-lock'>🔒 Gesperrt</span></div><div class='wifi-item'><p class='wifi-apt'>Apartment I</p><p class='wifi-meta'><strong>Netzwerk:</strong> Versteckt</p><p class='wifi-meta'><strong>Passwort:</strong> Versteckt</p><span class='wifi-lock'>🔒 Ges       const trainCard =
        "<div class='safety-card'><span class='safety-bullet' aria-hidden='true'></span>" +
        `<p class='safety-title'>${t.moreTrainHead}</p>` +
        `<p class='safety-note'>${t.moreTrainHtml}</p>` +
        `<p class='safety-note'><strong>${t.taxiMapLbl}</strong> <a class='link' target='_blank' rel='noreferrer' href='${TRAIN_MAPS_URL}'>${t.taxiMapLink}</a></p>` +
        "<p class='safety-note transport-app-downloads'>" +
        `<a class='link' target='_blank' rel='noreferrer' href='${CP_APP_IOS_URL}'>${t.cpAppIos}</a><br>` +
        `<a class='link' target='_blank' rel='noreferrer' href='${CP_APP_ANDROID_URL}'>${t.cpAppAndroid}</a>` +
        "</p>" +
        "</div>";
      const moreGrid =
        "<div class='safety-grid'>" +
        transportTopicCard(t.moreBusTitle, t.moreBusDetail) +
        trainCard +
        "</div>";
      return (
        "<div class='transport-tabs'>" +
        "<div class='transport-tablist' role='tablist'>" +
        "<button type='button' class='transport-tab transport-tab--active' role='tab' aria-selected='true'>" +
        `${t.tabTaxi}</button>` +
        `<button type='button' class='transport-tab' role='tab' aria-selected='false'>${t.tabUber}</button>` +
        `<button type='button' class='transport-tab' role='tab' aria-selected='false'>${t.tabMore}</button>` +
        "</div>" +
        "<div class='transport-panel transport-panel--active' role='tabpanel'><div class='transport-wrap'><div class='safety-grid'>" +
        taxiCard +
        "</div></div></div>" +
        "<div class='transport-panel' role='tabpanel'><div class='transport-wrap'><div class='safety-grid'>" +
        uberCard +
        "</div></div></div>" +
        "<div class='transport-panel' role='tabpanel'><div class='transport-wrap'>" +
        moreGrid +
        "</div></div>" +
        "</div>"
      );
    }

    function setupTransportTabs() {
      const root = document.querySelector(".transport-tabs");
      if (!root) return;
      const tabs = Array.from(root.querySelectorAll(".transport-tab"));
      const panels = Array.from(root.querySelectorAll(".transport-panel"));
      const activate = (i) => {
        tabs.forEach((btn, j) => {
          btn.classList.toggle("transport-tab--active", j === i);
          btn.setAttribute("aria-selected", j === i ? "true" : "false");
        });
        panels.forEach((p, j) => p.classList.toggle("transport-panel--active", j === i));
      };
      tabs.forEach((btn, i) => {
        btn.addEventListener("click", () => activate(i));
      });
    }

    function renderWifiSection(currentLang) {
      const t = wifiUi[currentLang] || wifiUi.pt;
      const cards = wifiApts.map((apt) =>
        `<div class='wifi-item'><p class='wifi-apt'>${t.apt} ${apt}</p><p class='wifi-meta'><strong>${t.network}</strong> ${t.hidden}</p><p class='wifi-meta'><strong>${t.password}</strong> ${t.hidden}</p><span class='wifi-lock'>${t.locked}</span><br><a class='wifi-btn' href='./wifi-acesso.html?apt=${apt}&lang=${currentLang}'>${t.button}</a></div>`
      ).join("");
      return `<p class='wifi-note'>${t.note}</p><div class='wifi-list'>${cards}</div>`;
    }

    function render() {
      const dict = text[lang];
      const item = dict.sections[sec];
      const title = document.getElementById("title");
      const subtitle = document.getElementById("subtitle");
      const content = document.getElementById("content");
      const back = document.querySelector(".back");

      back.textContent = dict.back;
      back.href = `./?lang=${lang}`;

      if (!item) {
        title.textContent = dict.fallbackTitle;
        subtitle.textContent = dict.fallbackSubtitle;
        content.innerHTML = "";
      } else {
        title.textContent = item.title;
        subtitle.textContent = item.subtitle;
        if (sec === "wifi") {
          content.innerHTML = renderWifiSection(lang);
        } else if (sec === "transport") {
          content.innerHTML = renderTransportSection(lang);
          setupTransportTabs();
        } else {
          content.innerHTML = item.html;
        }
      }

      document.documentElement.lang = lang === "pt" ? "pt-PT" : lang;
      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
    }

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        lang = btn.dataset.lang;
        const url = new URL(window.location.href);
        url.searchParams.set("lang", lang);
        window.history.replaceState({}, "", url);
        render();
      });
    });

    render();
  </script>
</body>
</html>

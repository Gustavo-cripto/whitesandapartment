    const params = new URLSearchParams(window.location.search);
    const sec = params.get("sec") || "welcome";
    let lang = params.get("lang") || "pt";
    if (!text[lang]) lang = "pt";

    function render() {
      const dict = text[lang];
      const item = dict.sections[sec];
      const title = document.getElementById("title");
      const subtitle = document.getElementById("subtitle");
      const content = document.getElementById("content");
      const back = document.querySelector(".back");

      back.textContent = dict.back;
      back.href = `./?lang=${lang}`;

      if (!item) {
        title.textContent = dict.fallbackTitle;
        subtitle.textContent = dict.fallbackSubtitle;
        content.innerHTML = "";
      } else {
        title.textContent = item.title;
        subtitle.textContent = item.subtitle;
        content.innerHTML = item.html;
      }

      document.documentElement.lang = lang === "pt" ? "pt-PT" : lang;
      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
    }

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        lang = btn.dataset.lang;
        const url = new URL(window.location.href);
        url.searchParams.set("lang", lang);
        window.history.replaceState({}, "", url);
        render();
      });
    });

    render();

        sections: {
          welcome: { title: "Welcome", subtitle: "White Sand Apartments overview.", html: "<div class='welcome-layout'><p class='welcome-block'>White Sand Apartments, totally refurbished, with a modern decoration, of type T1, T2 and T0, located in one of the most privileged areas of Albufeira, close to all services and just 300 m from the beach! With all the amenities that these offer we want to provide you with a great experience to make your stay as comfortable as possible and above all that you rest and enjoy a beautiful vacation!</p><div class='welcome-image-slot'><img src='./welcome-all.png' alt='White Sand apartment'></div></div>" },
          check: { title: "Check-in", subtitle: "Arrival details.", html: "<p class='line'><strong>Check-in:</strong> from 16:00</p><p class='line'>The keys will be placed in a small lockbox at the building entrance, and you will receive the access code on your arrival day.</p><div class='checkin-gallery'><img src='./checkin-1.jpg' alt='Key lockbox'><img src='./checkin-2.jpg' alt='Building entrance'><img src='./checkin-3.jpg' alt='Building location'></div>" },
          location: { title: "Location", subtitle: "Address and map.", html: "<p class='line'><strong>Address:</strong> Rua do MFA, n.15 Apto (Your Apartment Letter), 8200-157 Albufeira</p><p class='line'><strong>Coordinates:</strong> 37.0891053, -8.2507170</p><p class='line'><a class='link' target='_blank' rel='noreferrer' href='https://goo.gl/maps/sj565hq985biABaD6'>Open in Google Maps</a></p><div class='extra-location'><p class='extra-location-text'>The apartments are located in the historic center of Albufeira, just a few minutes on foot from Praia dos Pescadores and other beaches. The location is excellent, with restaurants, bars, supermarkets, and shops all around, making it easy to do everything on foot. A few meters away you will also find the Old Town Square, typical Algarve streets, and viewpoints with incredible sea views. Ideal for those who want to enjoy the best of the city, combining beach and entertainment without needing a car.</p><div class='extra-location-images'><img src='./localizacao-1.jpg' alt='Beach in Albufeira'><img src='./localizacao-2.jpg' alt='Albufeira historic center'></div></div>" },
          info: { title: "Information", subtitle: "Important stay details.", html: "<div class='info-sections'><div class='info-item'><p class='info-item-title'><span class='icon'>🅿️</span>Parking</p><p class='info-item-text'>On our street and in the nearby area you can park for free (street parking). There is also a paid parking area 130 meters away. Parking location: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/gmK6iXghkyXu6mPLA'>Open location</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧹</span>Cleaning service</p><p class='info-item-text'>We provide bed linen and bath towels for your stay. For longer stays, on the 8th day we provide a free linen change and a brief cleaning service.</p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🗑️</span>Waste bins</p><p class='info-item-text'>There are specific bins in a street below for you to dispose of your waste. Location: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/SYxqfTYpkznRy9Ky6'>Open location</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧾</span>TMT</p><p class='info-item-text'>Municipal tourist tax in Albufeira (€2 per person/night up to a maximum of 7 nights), according to local regulations. If this tax is not included in your reservation total, payment will be required according to the information sent to you.</p></div></div>" },
          rules: { title: "House rules", subtitle: "Main rules for a peaceful stay.", html: "<div class='rules-grid'><div class='rule-card'><p class='rule-num'>01</p><p class='rule-title'>No smoking</p><p class='rule-text'>Please do not smoke or vape inside or around the apartment.</p></div><div class='rule-card'><p class='rule-num'>02</p><p class='rule-title'>No visitors</p><p class='rule-text'>No unregistered visitors. Please inform the host if you want to add extra guests to your booking.</p></div><div class='rule-card'><p class='rule-num'>03</p><p class='rule-title'>No pets</p><p class='rule-text'>Pets are not allowed on the property at any time.</p></div><div class='rule-card'><p class='rule-num'>04</p><p class='rule-title'>No parties</p><p class='rule-text'>Parties or events are not allowed. Drug use and excessive alcohol consumption are prohibited.</p></div><div class='rule-card'><p class='rule-num'>05</p><p class='rule-title'>Damages</p><p class='rule-text'>Please report any damage or malfunction to the host immediately so we can repair or replace the affected item.</p></div><div class='rule-card'><p class='rule-num'>06</p><p class='rule-title'>Quiet hours</p><p class='rule-text'>For the comfort and enjoyment of both guests and neighbors, we kindly ask that noise levels be kept to a minimum during quiet hours.</p></div></div>" },
          amenities: { title: "Amenities", subtitle: "Apartment facilities available.", html: "<ul class='list'><li>Equipped kitchen (oven, hob, microwave).</li><li>Washing machine.</li><li>Wi-Fi, TV and air conditioning.</li></ul>" },

          transport: { title: "Transport", subtitle: "How to arrive and move around.", html: "<ul class='list'><li>Faro Airport: 45 km (30-40 min).</li><li>Taxi Albufeira: 289 583 230.</li><li>Bus line 10 about 50m away.</li><li>Train: Ferreiras-Albufeira station (<a class='link' target='_blank' rel='noreferrer' href='https://www.cp.pt'>cp.pt</a>).</li></ul>" },

      fr: {

        sections: {
          welcome: { title: "Bienvenue", subtitle: "Resume de l'hebergement.", html: "<div class='welcome-layout'><p class='welcome-block'>Appartements White Sand, totalement rénovés, avec une décoration moderne, de type T1, T2 et T0, situés dans l'un des quartiers les plus privilégiés d'Albufeira, à proximité de tous les services et à seulement 300 m de la plage! Avec toutes les commodités que celles-ci offrent, nous voulons vous offrir une expérience formidable pour rendre votre séjour aussi confortable que possible et surtout que vous vous reposiez et passiez de belles vacances!</p><div class='welcome-image-slot'><img src='./welcome-all.png' alt='Appartement White Sand'></div></div>" },
          check: { title: "Check-in", subtitle: "Details d'arrivee.", html: "<p class='line'><strong>Check-in:</strong> a partir de 16:00</p><p class='line'>Les cles seront placees dans un petit coffre a l'entree de l'immeuble, et vous recevrez le code d'acces le jour de votre arrivee.</p><div class='checkin-gallery'><img src='./checkin-1.jpg' alt='Boite a cles'><img src='./checkin-2.jpg' alt='Entree du batiment'><img src='./checkin-3.jpg' alt='Localisation de l entree'></div>" },
          location: { title: "Localisation", subtitle: "Adresse et carte.", html: "<p class='line'><strong>Adresse:</strong> Rua do MFA, n.15 Apto (Lettre de votre appartement), 8200-157 Albufeira</p><p class='line'><strong>Coordonnees:</strong> 37.0891053, -8.2507170</p><p class='line'><a class='link' target='_blank' rel='noreferrer' href='https://goo.gl/maps/sj565hq985biABaD6'>Ouvrir sur Google Maps</a></p><div class='extra-location'><p class='extra-location-text'>Les appartements sont situes dans le centre historique d'Albufeira, a quelques minutes a pied de Praia dos Pescadores et d'autres plages. L'emplacement est excellent, avec des restaurants, bars, supermarches et boutiques tout autour, ce qui permet de tout faire a pied. A quelques metres, vous trouverez aussi la place de la vieille ville, des rues typiques de l'Algarve et des points de vue incroyables sur la mer. Ideal pour ceux qui veulent profiter du meilleur de la ville, entre plage et animation, sans avoir besoin de voiture.</p><div class='extra-location-images'><img src='./localizacao-1.jpg' alt='Plage a Albufeira'><img src='./localizacao-2.jpg' alt='Centre historique d Albufeira'></div></div>" },
          info: { title: "Information", subtitle: "Informations importantes du sejour.", html: "<div class='info-sections'><div class='info-item'><p class='info-item-title'><span class='icon'>🅿️</span>Parking</p><p class='info-item-text'>Dans notre rue et aux alentours, vous pouvez vous garer gratuitement (stationnement dans la rue). Il existe aussi un parking payant a 130 metres. Localisation du parking: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/gmK6iXghkyXu6mPLA'>Ouvrir la localisation</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧹</span>Service de nettoyage</p><p class='info-item-text'>Nous fournissons les draps et les serviettes de bain pour votre sejour. Pour les sejours plus longs, au 8e jour nous offrons gratuitement un changement de linge et un bref nettoyage.</p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🗑️</span>Dechets - conteneurs</p><p class='info-item-text'>Dans une rue en dessous, vous trouverez des conteneurs specifiques pour deposer vos dechets. Localisation: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/SYxqfTYpkznRy9Ky6'>Ouvrir la localisation</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧾</span>TMT</p><p class='info-item-text'>Taxe touristique municipale d'Albufeira (2€ par personne/nuit jusqu'a un maximum de 7 nuits), conformement au reglement local. Si cette taxe n'est pas incluse dans le montant total de votre reservation, le paiement devra etre effectue selon les informations qui vous seront envoyees.</p></div></div>" },
          rules: { title: "Regles de la maison", subtitle: "Regles principales pour un sejour paisible.", html: "<div class='rules-grid'><div class='rule-card'><p class='rule-num'>01</p><p class='rule-title'>Interdit de fumer</p><p class='rule-text'>Merci de ne pas fumer ni vapoter a l'interieur ou autour de l'appartement.</p></div><div class='rule-card'><p class='rule-num'>02</p><p class='rule-title'>Sans visites</p><p class='rule-text'>Aucun visiteur non enregistre. Informez l'hote si vous souhaitez ajouter des invites a la reservation.</p></div><div class='rule-card'><p class='rule-num'>03</p><p class='rule-title'>Sans animaux</p><p class='rule-text'>Les animaux de compagnie ne sont pas autorises dans la propriete.</p></div><div class='rule-card'><p class='rule-num'>04</p><p class='rule-title'>Sans fetes</p><p class='rule-text'>Les fetes ou evenements ne sont pas autorises. L'usage de drogues et la consommation excessive d'alcool sont interdits.</p></div><div class='rule-card'><p class='rule-num'>05</p><p class='rule-title'>Dommages</p><p class='rule-text'>Veuillez signaler immediatement tout dommage ou dysfonctionnement a l'hote afin que nous puissions reparer ou remplacer l'article endommage.</p></div><div class='rule-card'><p class='rule-num'>06</p><p class='rule-title'>Heures de silence</p><p class='rule-text'>Pour le confort et le bien-etre des hotes et des voisins, nous vous demandons de reduire le bruit au minimum pendant les heures de silence.</p></div></div>" },
          amenities: { title: "Commodites", subtitle: "Equipements disponibles.", html: "<ul class='list'><li>Cuisine equipee (four, plaque, micro-ondes).</li><li>Machine a laver.</li><li>Wi-Fi, TV et climatisation.</li></ul>" },
          wifi: { title: "Wi-Fi", subtitle: "Acces internet.", html: "<p class='line'><strong>Reseau:</strong> WhiteSand-B</p><p class='line'><strong>Mot de passe:</strong> albufeira2020B</p>" },
          safety: { title: "Securite", subtitle: "Urgences et contacts utiles.", html: "<ul class='list'><li><strong>Urgence:</strong> 112</li><li>Ligne sante: 808 24 24 24</li><li>Hopital Lusíadas Albufeira: 289 892 040</li><li>Pompiers: 289 586 333</li><li>Police: 289 590 790</li></ul>" },
          transport: { title: "Transports", subtitle: "Comment arriver et se deplacer.", html: "<ul class='list'><li>Aeroport de Faro: 45 km (30-40 min).</li><li>Taxi Albufeira: 289 583 230.</li><li>Bus ligne 10 a environ 50m.</li><li>Train: gare Ferreiras-Albufeira (<a class='link' target='_blank' rel='noreferrer' href='https://www.cp.pt'>cp.pt</a>).</li></ul>" },

          checkout: { title: "Check-out", subtitle: "Avant de quitter l'appartement.", html: "<ul class='list'><li>Check-out entre 08:00 et 10:00.</li><li>Fermer les fenetres et eteindre lumiere/climatisation.</li><li>Laisser les cles selon les instructions.</li></ul>" },

      es: {

        sections: {
          welcome: { title: "Bienvenido", subtitle: "Resumen del alojamiento White Sand Apartments.", html: "<div class='welcome-layout'><p class='welcome-block'>Apartamentos White Sand, totalmente reformados, con una decoración moderna, de tipo T1, T2 y T0, situados en una de las zonas más privilegiadas de Albufeira, cerca de todos los servicios y a tan solo 300 m de la playa! Con todas las comodidades que estos ofrecen queremos brindarte una gran experiencia para que tu estadía sea lo más cómoda posible y sobre todo que descanses y disfrutes de unas hermosas vacaciones!</p><div class='welcome-image-slot'><img src='./welcome-all.png' alt='Apartamento White Sand'></div></div>" },
          check: { title: "Check-in", subtitle: "Detalles de llegada.", html: "<p class='line'><strong>Check-in:</strong> a partir de las 16:00</p><p class='line'>Las llaves se colocaran en una pequena caja de seguridad en la entrada del edificio, y recibiras el codigo de acceso el dia de tu llegada.</p><div class='checkin-gallery'><img src='./checkin-1.jpg' alt='Caja de llaves'><img src='./checkin-2.jpg' alt='Entrada del edificio'><img src='./checkin-3.jpg' alt='Ubicacion de entrada'></div>" },
          location: { title: "Ubicacion", subtitle: "Direccion y mapa.", html: "<p class='line'><strong>Direccion:</strong> Rua do MFA, n.15 Apto (Letra de su apartamento), 8200-157 Albufeira</p><p class='line'><strong>Coordenadas:</strong> 37.0891053, -8.2507170</p><p class='line'><a class='link' target='_blank' rel='noreferrer' href='https://goo.gl/maps/sj565hq985biABaD6'>Abrir en Google Maps</a></p><div class='extra-location'><p class='extra-location-text'>Los apartamentos estan ubicados en el centro historico de Albufeira, a pocos minutos a pie de Praia dos Pescadores y de otras playas. La ubicacion es excelente, con restaurantes, bares, supermercados y tiendas alrededor, permitiendo hacer todo a pie. A pocos metros tambien encontraras la Plaza del Casco Antiguo, calles tipicas del Algarve y miradores con vistas increibles al mar. Ideal para quien quiere aprovechar lo mejor de la ciudad, entre playa y animacion, sin necesidad de coche.</p><div class='extra-location-images'><img src='./localizacao-1.jpg' alt='Playa en Albufeira'><img src='./localizacao-2.jpg' alt='Centro historico de Albufeira'></div></div>" },
          info: { title: "Informacion", subtitle: "Datos importantes para la estancia.", html: "<div class='info-sections'><div class='info-item'><p class='info-item-title'><span class='icon'>🅿️</span>Aparcamiento</p><p class='info-item-text'>En nuestra calle y en los alrededores podras aparcar gratuitamente (aparcamiento en la calle). Tambien hay un aparcamiento de pago a 130 metros. Ubicacion del aparcamiento: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/gmK6iXghkyXu6mPLA'>Abrir ubicacion</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧹</span>Servicio de limpieza</p><p class='info-item-text'>Proporcionamos ropa de cama y toallas de bano para su estancia. Para estancias mas largas, en el 8o dia ofrecemos gratuitamente cambio de ropa y una breve limpieza.</p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🗑️</span>Basura - contenedores</p><p class='info-item-text'>En una calle mas abajo hay contenedores especificos para dejar su basura. Ubicacion: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/SYxqfTYpkznRy9Ky6'>Abrir ubicacion</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧾</span>TMT</p><p class='info-item-text'>Tasa turistica municipal de Albufeira (2€ por persona/noche hasta un maximo de 7 noches), conforme a la normativa local. Si este impuesto no esta incluido en el importe total de su reserva, el pago debera realizarse segun la informacion que se le enviara.</p></div></div>" },
          rules: { title: "Normas de la casa", subtitle: "Normas principales para una estancia tranquila.", html: "<div class='rules-grid'><div class='rule-card'><p class='rule-num'>01</p><p class='rule-title'>Prohibido fumar</p><p class='rule-text'>Por favor, no fume ni vapee dentro o en los alrededores del apartamento.</p></div><div class='rule-card'><p class='rule-num'>02</p><p class='rule-title'>Sin visitas</p><p class='rule-text'>No se permiten visitas no registradas. Informe al anfitrion si desea agregar huespedes a su reserva.</p></div><div class='rule-card'><p class='rule-num'>03</p><p class='rule-title'>Sin mascotas</p><p class='rule-text'>No se permiten mascotas en la propiedad en ningun momento.</p></div><div class='rule-card'><p class='rule-num'>04</p><p class='rule-title'>Sin fiestas</p><p class='rule-text'>No se permiten fiestas ni eventos. El uso de drogas y el consumo excesivo de alcohol estan prohibidos.</p></div><div class='rule-card'><p class='rule-num'>05</p><p class='rule-title'>Danos</p><p class='rule-text'>Por favor, informe de inmediato al anfitrion sobre cualquier dano o averia para poder reparar o sustituir el elemento afectado.</p></div><div class='rule-card'><p class='rule-num'>06</p><p class='rule-title'>Horas de silencio</p><p class='rule-text'>Para la comodidad y disfrute tanto de los huespedes como de los vecinos, solicitamos que los niveles de ruido se mantengan al minimo durante las horas de silencio.</p></div></div>" },
          amenities: { title: "Comodidades", subtitle: "Equipamiento disponible en el apartamento.", html: "<ul class='list'><li>Cocina equipada (horno, placa, microondas).</li><li>Lavadora.</li><li>Wi-Fi, TV y aire acondicionado.</li></ul>" },
          wifi: { title: "Wi-Fi", subtitle: "Datos de conexion a internet.", html: "<p class='line'><strong>Red:</strong> WhiteSand-B</p><p class='line'><strong>Contrasena:</strong> albufeira2020B</p>" },
          safety: { title: "Seguridad", subtitle: "Emergencias y contactos utiles.", html: "<ul class='list'><li><strong>Emergencia:</strong> 112</li><li>Linea de salud: 808 24 24 24</li><li>Hospital Lusíadas Albufeira: 289 892 040</li><li>Bomberos: 289 586 333</li><li>Policia: 289 590 790</li></ul>" },
          transport: { title: "Transporte", subtitle: "Como llegar y moverse por la zona.", html: "<ul class='list'><li>Aeropuerto de Faro: 45 km (30-40 min).</li><li>Taxi Albufeira: 289 583 230.</li><li>Bus linea 10 a unos 50m.</li><li>Tren: estacion Ferreiras-Albufeira (<a class='link' target='_blank' rel='noreferrer' href='https://www.cp.pt'>cp.pt</a>).</li></ul>" },

      de: {
        back: "← Zurueck",
        fallbackTitle: "Information",
        fallbackSubtitle: "Thema nicht gefunden.",
        sections: {
          welcome: { title: "Willkommen", subtitle: "Ueberblick ueber die Unterkunft.", html: "<div class='welcome-layout'><p class='welcome-block'>White Sand Apartments, komplett renoviert und modern eingerichtet, in den Typen T1, T2 und T0, befinden sich in einer der privilegiertesten Gegenden von Albufeira, nahe aller Dienstleistungen und nur 300 m vom Strand entfernt! Mit allen angebotenen Annehmlichkeiten moechten wir dir ein grossartiges Erlebnis bieten, damit dein Aufenthalt so komfortabel wie moeglich ist und du vor allem ausruhst und einen wunderschoenen Urlaub geniesst!</p><div class='welcome-image-slot'><img src='./welcome-all.png' alt='White Sand Wohnung'></div></div>" },
          check: { title: "Check-in", subtitle: "Anreiseinformationen.", html: "<p class='line'><strong>Check-in:</strong> ab 16:00</p><p class='line'>Die Schluessel werden in einem kleinen Schluesseltresor am Gebaeudeeingang hinterlegt, und du erhaeltst den Zugangscode am Tag deiner Anreise.</p><div class='checkin-gallery'><img src='./checkin-1.jpg' alt='Schluesseltresor'><img src='./checkin-2.jpg' alt='Gebaeudeeingang'><img src='./checkin-3.jpg' alt='Eingangsposition'></div>" },
          location: { title: "Lage", subtitle: "Adresse und Karte.", html: "<p class='line'><strong>Adresse:</strong> Rua do MFA, n.15 Apto (Buchstabe Ihrer Wohnung), 8200-157 Albufeira</p><p class='line'><strong>Koordinaten:</strong> 37.0891053, -8.2507170</p><p class='line'><a class='link' target='_blank' rel='noreferrer' href='https://goo.gl/maps/sj565hq985biABaD6'>In Google Maps oeffnen</a></p><div class='extra-location'><p class='extra-location-text'>Die Apartments liegen im historischen Zentrum von Albufeira, nur wenige Gehminuten von der Praia dos Pescadores und anderen Straenden entfernt. Die Lage ist ausgezeichnet, mit Restaurants, Bars, Supermaerkten und Geschaeften direkt in der Umgebung, sodass man alles zu Fuss erledigen kann. Nur wenige Meter entfernt befinden sich auch der Platz der Altstadt, typische Algarve-Gassen und Aussichtspunkte mit beeindruckendem Meerblick. Ideal fuer alle, die das Beste der Stadt zwischen Strand und Unterhaltung geniessen moechten, ohne ein Auto zu brauchen.</p><div class='extra-location-images'><img src='./localizacao-1.jpg' alt='Strand in Albufeira'><img src='./localizacao-2.jpg' alt='Historisches Zentrum von Albufeira'></div></div>" },
          info: { title: "Information", subtitle: "Wichtige Infos fuer den Aufenthalt.", html: "<div class='info-sections'><div class='info-item'><p class='info-item-title'><span class='icon'>🅿️</span>Parken</p><p class='info-item-text'>In unserer Strasse und in der Umgebung koennen Sie kostenlos parken (Strassenparkplaetze). Es gibt auch einen kostenpflichtigen Parkplatz in 130 Metern Entfernung. Parkplatz-Standort: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/gmK6iXghkyXu6mPLA'>Standort oeffnen</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧹</span>Reinigungsservice</p><p class='info-item-text'>Wir stellen Bettwaesche und Badetuecher fuer Ihren Aufenthalt bereit. Bei laengeren Aufenthalten bieten wir am 8. Tag kostenlos einen Waeschewechsel und eine kurze Reinigung an.</p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🗑️</span>Muell - Container</p><p class='info-item-text'>In einer Strasse weiter unten gibt es spezielle Container zur Entsorgung Ihres Muells. Standort: <a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/SYxqfTYpkznRy9Ky6'>Standort oeffnen</a></p></div><div class='info-item'><p class='info-item-title'><span class='icon'>🧾</span>TMT</p><p class='info-item-text'>Kommunale Tourismussteuer von Albufeira (2€ pro Person/Nacht bis maximal 7 Naechte), gemaess den lokalen Bestimmungen. Falls diese Steuer nicht im Gesamtbetrag Ihrer Buchung enthalten ist, muss die Zahlung gemaess den Ihnen zugesendeten Informationen erfolgen.</p></div></div>" },
          rules: { title: "Hausregeln", subtitle: "Wichtige Regeln fuer einen ruhigen Aufenthalt.", html: "<div class='rules-grid'><div class='rule-card'><p class='rule-num'>01</p><p class='rule-title'>Rauchen verboten</p><p class='rule-text'>Bitte nicht in oder rund um die Wohnung rauchen oder vapen.</p></div><div class='rule-card'><p class='rule-num'>02</p><p class='rule-title'>Keine Besucher</p><p class='rule-text'>Keine nicht registrierten Besucher. Informieren Sie den Gastgeber, wenn Sie weitere Gaeste zur Buchung hinzufuegen moechten.</p></div><div class='rule-card'><p class='rule-num'>03</p><p class='rule-title'>Keine Haustiere</p><p class='rule-text'>Haustiere sind auf dem gesamten Grundstueck nicht erlaubt.</p></div><div class='rule-card'><p class='rule-num'>04</p><p class='rule-title'>Keine Partys</p><p class='rule-text'>Partys oder Veranstaltungen sind nicht erlaubt. Drogenkonsum und uebermaessiger Alkoholkonsum sind verboten.</p></div><div class='rule-card'><p class='rule-num'>05</p><p class='rule-title'>Schaeden</p><p class='rule-text'>Bitte melden Sie Schaeden oder Stoerungen sofort dem Gastgeber, damit wir den betroffenen Gegenstand reparieren oder ersetzen koennen.</p></div><div class='rule-card'><p class='rule-num'>06</p><p class='rule-title'>Ruhezeiten</p><p class='rule-text'>Fuer den Komfort und das Wohlbefinden von Gaesten und Nachbarn bitten wir darum, den Geraeuschpegel waehrend der Ruhezeiten auf ein Minimum zu reduzieren.</p></div></div>" },
          amenities: { title: "Komfort", subtitle: "Ausstattung der Unterkunft.", html: "<ul class='list'><li>Voll ausgestattete Kueche (Ofen, Kochfeld, Mikrowelle).</li><li>Waschmaschine.</li><li>Wi-Fi, TV und Klimaanlage.</li></ul>" },
          wifi: { title: "Wi-Fi", subtitle: "Internetzugang.", html: "<p class='line'><strong>Netzwerk:</strong> WhiteSand-B</p><p class='line'><strong>Passwort:</strong> albufeira2020B</p>" },
          safety: { title: "Sicherheit", subtitle: "Notfall und wichtige Kontakte.", html: "<ul class='list'><li><strong>Notfall:</strong> 112</li><li>Gesundheitslinie: 808 24 24 24</li><li>Lusíadas Krankenhaus Albufeira: 289 892 040</li><li>Feuerwehr: 289 586 333</li><li>Polizei: 289 590 790</li></ul>" },
          transport: { title: "Transport", subtitle: "Anreise und Fortbewegung.", html: "<ul class='list'><li>Flughafen Faro: 45 km (30-40 Min).</li><li>Taxi Albufeira: 289 583 230.</li><li>Buslinie 10 etwa 50m entfernt.</li><li>Zug: Bahnhof Ferreiras-Albufeira (<a class='link' target='_blank' rel='noreferrer' href='https://www.cp.pt'>cp.pt</a>).</li></ul>" },

          activities: { title: "Aktivitaeten", subtitle: "Ideen fuer den Aufenthalt.", html: "<ul class='list'><li>Bootstouren und Hoehlenbesuche.</li><li>Strandaktivitaeten und Wassersport.</li><li>Spaziergaenge in der Altstadt von Albufeira.</li></ul>" },
          eat: { title: "Essen & Trinken", subtitle: "Empfohlene Restaurants.", html: "<ul class='list'><li><a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/rA4cq7F3agYmyYcy6'>Franguinho de Albufeira</a></li><li><a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/w9gtzSM2WV5ixY5YA'>Tasca do Viegas</a></li><li><a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/uXt8f8Lu8vPBQv7c6'>Clay Oven</a></li><li><a class='link' target='_blank' rel='noreferrer' href='https://maps.app.goo.gl/5GTwm6RyKvPDEC338'>Taberna do Pescador</a></li></ul>" },
          bars: { title: "Bars & Clubs", subtitle: "Tipps fuer das Nachtleben.", html: "<ul class='list'><li>Oura und Altstadt fuer Nachtleben erkunden.</li><li>Fragen Sie uns nach aktuellen Empfehlungen.</li></ul>" },
          shopping: { title: "Einkauf", subtitle: "Supermaerkte und Einkaufszentren.", html: "<ul class='list'><li>Lidl / Aldi (ca. 1 km).</li><li>Continente / Pingo Doce (ca. 1,1 km).</li><li>Algarve Shopping und MAR Shopping Algarve.</li></ul>" },
          emergency: { title: "Notfall", subtitle: "Sofortige Kontakte.", html: "<ul class='list'><li><strong>112</strong> (Krankenwagen, Polizei, Feuerwehr).</li><li>Adresse nennen: Rua do MFA n.15 Apto B, Albufeira.</li><li>Nach 112 den Gastgeber kontaktieren.</li></ul>" },
          checkout: { title: "Check-out", subtitle: "Vor dem Verlassen der Unterkunft.", html: "<ul class='list'><li>Check-out zwischen 08:00 und 10:00.</li><li>Fenster schliessen, Licht und Klima ausschalten.</li><li>Schluessel gemaess Anweisungen hinterlassen.</li></ul>" },
          contacts: { title: "Kontakte", subtitle: "Schnellkontakt-Kanaele.", html: "<ul class='list'><li><a class='link' href='tel:+351910000000'>+351 910 000 000</a></li><li><a class='link' target='_blank' rel='noreferrer' href='https://wa.me/351910000000'>WhatsApp</a></li><li><a class='link' href='mailto:reservas@whitesand.pt'>reservas@whitesand.pt</a></li></ul>" },
          pdf: { title: "PDF-Version", subtitle: "PDF-Flyer oeffnen oder herunterladen.", html: "<p class='line'><a class='link' target='_blank' rel='noreferrer' href='./Book-WS-B.pdf'>PDF oeffnen</a></p>" }
        }
      }
    };

    const params = new URLSearchParams(window.location.search);
    const sec = params.get("sec") || "welcome";
    let lang = params.get("lang") || "pt";
    if (!text[lang]) lang = "pt";

    function render() {
      const dict = text[lang];
      const item = dict.sections[sec];
      const title = document.getElementById("title");
      const subtitle = document.getElementById("subtitle");
      const content = document.getElementById("content");
      const back = document.querySelector(".back");

      back.textContent = dict.back;
      back.href = `./?lang=${lang}`;

      if (!item) {
        title.textContent = dict.fallbackTitle;
        subtitle.textContent = dict.fallbackSubtitle;
        content.innerHTML = "";
      } else {
        title.textContent = item.title;
        subtitle.textContent = item.subtitle;
        content.innerHTML = item.html;
      }

      document.documentElement.lang = lang === "pt" ? "pt-PT" : lang;
      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
    }

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        lang = btn.dataset.lang;
        const url = new URL(window.location.href);
        url.searchParams.set("lang", lang);
        window.history.replaceState({}, "", url);
        render();
      });
    });

    render();
  </script>
